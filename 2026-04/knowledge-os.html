<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge OS — Build. Compound. Output.</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #060810;
  --bg2:    #0c1018;
  --gold:   #f5c842;
  --teal:   #2de2c8;
  --coral:  #ff6b6b;
  --violet: #a78bfa;
  --text:   #eef2ff;
  --muted:  #7a8599;
  --card:   rgba(255,255,255,0.045);
  --border: rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  overflow:hidden;
  height:100vh;width:100vw;
  cursor:none;
}

/* CUSTOM CURSOR */
#cursor{
  position:fixed;width:14px;height:14px;
  border-radius:50%;background:var(--gold);
  pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform 0.1s,width 0.2s,height 0.2s;
  mix-blend-mode:difference;
}

/* ── DECK ── */
#deck{position:relative;width:100vw;height:100vh;}

.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding:56px 88px;
  opacity:0;pointer-events:none;
  transition:opacity 0.55s cubic-bezier(.4,0,.2,1),
             transform 0.55s cubic-bezier(.4,0,.2,1);
  transform:scale(0.97) translateY(20px);
  text-align:center;
  overflow:hidden;
}
.slide.active{opacity:1;pointer-events:all;transform:scale(1) translateY(0);}
.slide.exit{opacity:0;transform:scale(1.03) translateY(-20px);}

/* Dot-matrix background */
.slide::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(245,200,66,0.09) 1px,transparent 1px);
  background-size:32px 32px;
  pointer-events:none;z-index:0;
}
.slide>*{position:relative;z-index:1;}

/* Diagonal accent line */
.slide::after{
  content:'';position:absolute;
  top:-60px;right:-80px;
  width:300px;height:300px;
  border:1px solid rgba(245,200,66,0.06);
  border-radius:50%;
  pointer-events:none;z-index:0;
}

/* ── CHAPTER BADGE ── */
.badge{
  font-family:'Courier Prime',monospace;
  font-size:21px;
  letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);
  background:rgba(245,200,66,0.08);
  border:1px solid rgba(245,200,66,0.25);
  padding:7px 20px;border-radius:100px;
  margin-bottom:22px;display:inline-block;
}
.badge.teal{color:var(--teal);background:rgba(45,226,200,0.08);border-color:rgba(45,226,200,0.25);}
.badge.coral{color:var(--coral);background:rgba(255,107,107,0.08);border-color:rgba(255,107,107,0.25);}
.badge.violet{color:var(--violet);background:rgba(167,139,250,0.08);border-color:rgba(167,139,250,0.25);}

/* ── TYPE SCALE ── */
.display{
  font-family:'Syne',sans-serif;
  font-size:clamp(48px,7.5vw,88px);
  font-weight:800;line-height:1;
  letter-spacing:-1px;margin-bottom:20px;
}
.h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(38px,5.5vw,62px);
  font-weight:700;line-height:1.1;
  margin-bottom:20px;letter-spacing:-0.5px;
}
.h2{
  font-family:'Syne',sans-serif;
  font-size:clamp(30px,4vw,50px);
  font-weight:700;line-height:1.2;
  margin-bottom:18px;
}
.body{
  font-size:clamp(22px,2.1vw,32px);
  line-height:1.65;max-width:820px;
  color:#c4cfdf;font-weight:300;
}
.body b{color:var(--text);font-weight:600;}
.body em{color:var(--gold);font-style:normal;font-weight:500;}
.mono{font-family:'Courier Prime',monospace;font-size:clamp(21px,1.7vw,27px);}

/* ── COLORS ── */
.gold{color:var(--gold);}
.teal{color:var(--teal);}
.coral{color:var(--coral);}
.violet{color:var(--violet);}

/* ── RULE ── */
.rule{width:64px;height:3px;background:var(--gold);border-radius:2px;margin:0 auto 28px;flex-shrink:0;}
.rule.teal{background:var(--teal);}
.rule.coral{background:var(--coral);}
.rule.violet{background:var(--violet);}

/* ── FLOW DIAGRAM ── */
.flow{
  display:flex;align-items:center;
  gap:16px;flex-wrap:wrap;justify-content:center;
  margin:16px 0;
}
.flow-node{
  background:var(--card);
  border:1px solid rgba(245,200,66,0.2);
  border-radius:10px;
  padding:14px 26px;
  font-family:'Syne',sans-serif;
  font-size:clamp(22px,2vw,30px);
  font-weight:700;color:var(--gold);
}
.flow-arr{font-size:clamp(24px,2.5vw,34px);color:var(--muted);animation:arr 1.6s infinite;}
@keyframes arr{0%,100%{opacity:1;transform:translateX(0);}50%{opacity:.4;transform:translateX(6px);}}

/* ── STAT GRID ── */
.stat-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:18px;max-width:880px;width:100%;margin-top:16px;
}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:28px 18px;
}
.stat-n{
  font-family:'Syne',sans-serif;
  font-size:clamp(40px,5vw,56px);
  font-weight:800;color:var(--gold);
  line-height:1;margin-bottom:8px;
}
.stat-d{font-size:clamp(21px,1.6vw,24px);color:var(--muted);line-height:1.4;}

/* ── LIST ── */
.lst{list-style:none;text-align:left;max-width:780px;width:100%;}
.lst li{
  font-size:clamp(22px,2vw,30px);
  padding:12px 0;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:14px;
  line-height:1.45;color:#c4cfdf;
}
.lst li::before{
  content:'◆';color:var(--gold);
  font-size:18px;flex-shrink:0;margin-top:5px;
}
.lst.teal li::before{content:'◆';color:var(--teal);}
.lst.coral li::before{content:'◆';color:var(--coral);}
.lst li strong{color:var(--text);}
.lst li em{color:var(--gold);font-style:normal;}

/* ── TWO COL ── */
.two{
  display:grid;grid-template-columns:1fr 1fr;
  gap:24px;max-width:960px;width:100%;text-align:left;
}
.box{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:28px 26px;
}
.box h3{
  font-family:'Syne',sans-serif;
  font-size:clamp(26px,2.8vw,38px);
  font-weight:700;margin-bottom:14px;
}
.box p{font-size:clamp(21px,1.65vw,26px);line-height:1.55;color:#b0bfd4;}
.box.gold-b{border-color:rgba(245,200,66,0.25);}
.box.teal-b{border-color:rgba(45,226,200,0.25);}
.box.coral-b{border-color:rgba(255,107,107,0.25);}
.box.violet-b{border-color:rgba(167,139,250,0.25);}

/* ── CODE BOX ── */
.code{
  background:#0a0d14;
  border:1px solid rgba(45,226,200,0.2);
  border-radius:12px;
  padding:26px 34px;
  font-family:'Courier Prime',monospace;
  font-size:clamp(21px,1.65vw,26px);
  text-align:left;max-width:800px;width:100%;
  line-height:1.85;color:#c8d4e4;
}
.code .kw{color:var(--coral);}
.code .fn{color:var(--teal);}
.code .st{color:var(--gold);}
.code .cm{color:var(--muted);}

/* ── QUOTE ── */
.qblock{
  border-left:4px solid var(--gold);
  padding:24px 32px;text-align:left;
  max-width:800px;
  background:rgba(245,200,66,0.05);
  border-radius:0 12px 12px 0;
}
.qblock p{
  font-size:clamp(26px,2.5vw,36px);
  line-height:1.5;font-style:italic;
  color:var(--text);margin-bottom:14px;
}
.qblock cite{
  font-family:'Courier Prime',monospace;
  font-size:22px;color:var(--gold);font-style:normal;
}

/* ── PILL ── */
.pill{
  display:inline-block;
  font-family:'Courier Prime',monospace;
  font-size:21px;
  padding:8px 18px;border-radius:100px;
  margin:5px 4px;
}
.pill.gold{background:rgba(245,200,66,0.1);border:1px solid rgba(245,200,66,0.3);color:var(--gold);}
.pill.teal{background:rgba(45,226,200,0.1);border:1px solid rgba(45,226,200,0.3);color:var(--teal);}
.pill.coral{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:var(--coral);}
.pill.violet{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.3);color:var(--violet);}

/* ── STEP LIST ── */
.steps{display:flex;flex-direction:column;gap:0;max-width:740px;width:100%;text-align:left;}
.step{
  display:flex;gap:22px;align-items:flex-start;
  padding:16px 0 16px 32px;
  border-left:2px solid rgba(45,226,200,0.2);
  position:relative;
}
.step::before{
  content:'';position:absolute;left:-7px;top:24px;
  width:12px;height:12px;border-radius:50%;
  background:var(--teal);
}
.step-n{
  font-family:'Syne',sans-serif;font-size:22px;
  font-weight:800;color:var(--teal);
  min-width:36px;flex-shrink:0;
}
.step-t{font-size:clamp(22px,1.9vw,28px);color:#c0d0e0;line-height:1.45;}
.step-t strong{color:var(--text);}

/* ── TABLE ── */
.tbl{
  width:100%;max-width:820px;
  border-collapse:collapse;
  font-size:clamp(21px,1.7vw,26px);
}
.tbl th{
  font-family:'Syne',sans-serif;font-weight:700;
  font-size:clamp(21px,1.6vw,24px);
  padding:14px 18px;text-align:left;
  background:rgba(245,200,66,0.08);
  border-bottom:2px solid rgba(245,200,66,0.25);
  color:var(--gold);
}
.tbl td{
  padding:13px 18px;
  border-bottom:1px solid var(--border);
  color:#c0cfe0;line-height:1.4;
}
.tbl tr:hover td{background:rgba(255,255,255,0.03);}

/* ── PROGRESS ── */
#pbar{
  position:fixed;bottom:0;left:0;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--teal));
  transition:width 0.5s ease;z-index:100;
}
#ctr{
  position:fixed;bottom:18px;right:26px;
  font-family:'Courier Prime',monospace;
  font-size:21px;color:var(--muted);z-index:100;
}
.nav{
  position:fixed;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);color:var(--text);
  font-size:24px;width:48px;height:48px;
  border-radius:50%;cursor:none;
  display:flex;align-items:center;justify-content:center;
  z-index:100;transition:background .2s,border-color .2s;
}
.nav:hover{background:rgba(245,200,66,0.1);border-color:rgba(245,200,66,0.4);}
#prev{left:18px;}#next{right:18px;}
#dots{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%);
  display:flex;gap:5px;z-index:100;
}
.dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--muted);
  transition:background .3s,width .3s;cursor:none;
}
.dot.on{background:var(--gold);width:16px;border-radius:3px;}

/* ── CHAPTER DIVIDER slides ── */
.ch-slide{background:linear-gradient(135deg,#090b12 0%,#0f1520 100%);}
.ch-slide::before{background-image:linear-gradient(rgba(45,226,200,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(45,226,200,0.05) 1px,transparent 1px);background-size:40px 40px;}

/* ── GLOW ── */
.glow-g{text-shadow:0 0 40px rgba(245,200,66,.4);}
.glow-t{text-shadow:0 0 40px rgba(45,226,200,.4);}
.glow-c{text-shadow:0 0 40px rgba(255,107,107,.4);}
.glow-v{text-shadow:0 0 40px rgba(167,139,250,.4);}

/* vertical rule */
.vr{width:2px;height:60px;background:linear-gradient(var(--gold),transparent);margin:16px auto;}

/* big number */
.big-n{
  font-family:'Syne',sans-serif;
  font-size:clamp(100px,16vw,160px);
  font-weight:800;line-height:1;
  opacity:0.07;position:absolute;
  right:60px;bottom:30px;
  color:var(--gold);pointer-events:none;
  z-index:0;letter-spacing:-4px;
}

</style>
</head>
<body>
<div id="cursor"></div>
<div id="deck"></div>
<div id="pbar"></div>
<div id="ctr"></div>
<div id="dots"></div>
<button class="nav" id="prev">&#8592;</button>

// ── RENDER ──────────────────────────────────────
const deck = document.getElementById('deck');
const pbar = document.getElementById('pbar');
const ctr  = document.getElementById('ctr');
const dots = document.getElementById('dots');
let cur = 0, busy = false;

S.forEach((s,i)=>{
  const d = document.createElement('div');
  d.className='slide'+(i===0?' active':'');
  d.innerHTML=s.h;
  deck.appendChild(d);
  const dt=document.createElement('div');
  dt.className='dot'+(i===0?' on':'');
  dt.onclick=()=>go(i);
  dots.appendChild(dt);
});

const allS=deck.querySelectorAll('.slide');
const allD=dots.querySelectorAll('.dot');

function ui(){
  ctr.textContent=`${cur+1} / ${S.length}`;
  pbar.style.width=((cur+1)/S.length*100)+'%';
  allD.forEach((d,i)=>d.classList.toggle('on',i===cur));
}

function go(n){
  if(busy||n===cur)return;
  busy=true;
  const p=cur;cur=n;
  allS[p].classList.add('exit');allS[p].classList.remove('active');
  setTimeout(()=>{
    allS[p].classList.remove('exit');
    allS[cur].classList.add('active');
    ui();
    setTimeout(()=>{busy=false;},580);
  },280);
}

const next=()=>go((cur+1)%S.length);
const prev=()=>go((cur-1+S.length)%S.length);
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')next();
  if(e.key==='ArrowLeft')prev();
});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(dx<-50)next();if(dx>50)prev();
});

// cursor
const cur_ = document.getElementById('cursor');
document.addEventListener('mousemove',e=>{
  cur_.style.left=e.clientX+'px';cur_.style.top=e.clientY+'px';
});
document.addEventListener('mousedown',()=>{cur_.style.transform='translate(-50%,-50%) scale(2)';});
document.addEventListener('mouseup',()=>{cur_.style.transform='translate(-50%,-50%) scale(1)';});

ui();
</script>
