<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module 8 — Building an AI-Ready Organization</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inconsolata:wght@400;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #07090f;
  --surface: #0e1220;
  --border:  rgba(255,255,255,0.08);
  --gold:    #f0c040;
  --teal:    #38e8c8;
  --coral:   #ff6b6b;
  --sky:     #74b9ff;
  --lime:    #a8e063;
  --text:    #e4e8f0;
  --muted:   #8899bb;
  --card:    rgba(255,255,255,0.04);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  overflow:hidden;
  height:100vh; width:100vw;
  user-select:none;
}

/* ── NOISE OVERLAY ── */
body::after{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:999;opacity:0.4;
}

/* ── DECK ── */
#deck{position:relative;width:100vw;height:100vh;}

.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding:56px 80px;
  opacity:0;pointer-events:none;
  transition:opacity .55s cubic-bezier(.4,0,.2,1), transform .55s cubic-bezier(.4,0,.2,1);
  transform:translateX(48px);
  text-align:center;
  overflow:hidden;
}
.slide.active{opacity:1;pointer-events:all;transform:translateX(0);}
.slide.exit{opacity:0;transform:translateX(-48px);}

/* decorative hex grid bg */
.slide::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(circle at 20% 80%, rgba(56,232,200,.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(240,192,64,.05) 0%, transparent 50%);
  pointer-events:none;z-index:0;
}
.slide>*{position:relative;z-index:1;}

/* ── SECTION BADGE ── */
.badge{
  font-family:'Inconsolata',monospace;
  font-size:21px;
  color:var(--teal);
  letter-spacing:3px;
  text-transform:uppercase;
  margin-bottom:18px;
  opacity:.85;
}

/* ── HEADINGS ── */
.h-giant{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:clamp(44px,7.5vw,80px);
  line-height:1.05;
  letter-spacing:-1px;
  margin-bottom:22px;
}
.h-main{
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:clamp(36px,5.5vw,60px);
  line-height:1.1;
  margin-bottom:20px;
  letter-spacing:-.5px;
}
.h-sub{
  font-family:'Syne',sans-serif;
  font-weight:600;
  font-size:clamp(28px,3.5vw,44px);
  line-height:1.2;
  margin-bottom:16px;
}

/* ── BODY TEXT ── */
.body{
  font-family:'Lora',serif;
  font-size:clamp(22px,2.1vw,32px);
  line-height:1.65;
  max-width:840px;
  color:#ccd6e8;
  font-weight:400;
}
.body strong{color:var(--gold);font-weight:600;}
.body em{color:var(--teal);font-style:normal;font-weight:600;}

/* ── ACCENT COLORS ── */
.g{color:var(--gold);}
.t{color:var(--teal);}
.r{color:var(--coral);}
.s{color:var(--sky);}
.l{color:var(--lime);}

/* ── RULE ── */
.rule{width:64px;height:3px;background:var(--teal);border-radius:2px;margin:0 auto 26px;}
.rule.g{background:var(--gold);}
.rule.r{background:var(--coral);}
.rule.s{background:var(--sky);}
.rule.l{background:var(--lime);}

/* ── LIST ── */
.lst{list-style:none;text-align:left;max-width:820px;width:100%;}
.lst li{
  font-family:'Lora',serif;
  font-size:clamp(22px,1.9vw,29px);
  padding:11px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:flex-start;gap:14px;
  line-height:1.45;color:#ccd4e8;
}
.lst li::before{content:'▸';color:var(--teal);font-size:22px;flex-shrink:0;margin-top:3px;}
.lst li.r::before{color:var(--coral);}
.lst li.g::before{color:var(--gold);}
.lst li.s::before{color:var(--sky);}
.lst li span{color:var(--gold);}

/* ── 2-COL ── */
.two{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:980px;width:100%;text-align:left;}
.box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px 26px;}
.box h3{font-size:clamp(26px,2.8vw,38px);margin-bottom:14px;font-weight:700;}
.box p, .box li{font-family:'Lora',serif;font-size:clamp(21px,1.7vw,26px);line-height:1.55;color:#b8ccd8;}
.box ul{list-style:none;padding:0;}
.box ul li{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.box ul li::before{content:'· ';color:var(--teal);}

/* ── 3-COL ── */
.three{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:980px;width:100%;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 20px;text-align:center;}
.scard .big{font-size:clamp(38px,4.5vw,54px);font-weight:800;line-height:1;margin-bottom:10px;}
.scard .desc{font-family:'Lora',serif;font-size:clamp(21px,1.6vw,24px);color:var(--muted);line-height:1.4;}

/* ── 4-COL LEVEL ── */
.four{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:1040px;width:100%;}
.lcard{border-radius:12px;padding:22px 18px;text-align:left;border:1px solid var(--border);}
.lcard .ln{font-size:clamp(30px,3.2vw,44px);font-weight:800;margin-bottom:8px;}
.lcard .lt{font-size:clamp(21px,1.8vw,26px);font-weight:700;margin-bottom:10px;}
.lcard .ld{font-family:'Lora',serif;font-size:clamp(20px,1.5vw,22px);color:var(--muted);line-height:1.4;}

/* ── PHASE STRIP ── */
.phase-row{display:flex;gap:16px;max-width:1020px;width:100%;align-items:stretch;}
.ph{flex:1;background:var(--card);border-radius:12px;padding:22px 18px;border:1px solid var(--border);}
.ph-label{font-size:clamp(21px,1.8vw,26px);font-weight:700;margin-bottom:10px;}
.ph-days{font-family:'Inconsolata',monospace;font-size:22px;color:var(--teal);margin-bottom:12px;}
.ph ul{list-style:none;padding:0;}
.ph ul li{font-family:'Lora',serif;font-size:clamp(20px,1.5vw,22px);color:#b0c4d4;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.ph ul li::before{content:'→ ';}

/* ── QUOTE ── */
.qblock{border-left:4px solid var(--gold);padding:26px 34px;text-align:left;max-width:840px;background:rgba(240,192,64,.05);border-radius:0 12px 12px 0;}
.qblock p{font-family:'Lora',serif;font-size:clamp(26px,2.6vw,36px);line-height:1.55;font-style:italic;color:var(--text);margin-bottom:14px;}
.qblock cite{font-size:22px;color:var(--gold);font-style:normal;font-family:'Inconsolata',monospace;}

/* ── CODE BOX ── */
.code{background:#080d16;border:1px solid rgba(56,232,200,.18);border-radius:12px;padding:26px 32px;font-family:'Inconsolata',monospace;font-size:clamp(21px,1.7vw,25px);text-align:left;max-width:840px;width:100%;line-height:1.9;color:#cdd6f4;}
.code .kw{color:var(--coral);}
.code .fn{color:var(--teal);}
.code .st{color:var(--gold);}
.code .cm{color:var(--muted);}

/* ── PILL ── */
.pill{display:inline-block;background:rgba(56,232,200,.1);border:1px solid rgba(56,232,200,.25);color:var(--teal);font-family:'Inconsolata',monospace;font-size:22px;padding:7px 18px;border-radius:100px;margin:5px 4px;}
.pill.g{background:rgba(240,192,64,.1);border-color:rgba(240,192,64,.25);color:var(--gold);}
.pill.r{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.25);color:var(--coral);}
.pill.s{background:rgba(116,185,255,.1);border-color:rgba(116,185,255,.25);color:var(--sky);}
.pill.l{background:rgba(168,224,99,.1);border-color:rgba(168,224,99,.25);color:var(--lime);}

/* ── MATRIX ── */
.matrix{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px;width:100%;text-align:left;}
.mx{background:var(--card);border-radius:12px;padding:22px 22px;border:1px solid var(--border);}
.mx h4{font-size:clamp(23px,2.2vw,30px);margin-bottom:10px;font-weight:700;}
.mx p{font-family:'Lora',serif;font-size:clamp(21px,1.6vw,24px);color:var(--muted);line-height:1.45;}

/* ── ICON ROW ── */
.icon-row{display:flex;justify-content:center;gap:40px;margin:20px 0;}
.icon-item{text-align:center;}
.icon-item .ico{font-size:clamp(44px,5vw,58px);margin-bottom:10px;}
.icon-item .ico-label{font-size:clamp(21px,1.7vw,24px);color:var(--muted);}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:960px;width:100%;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px 18px;text-align:center;}
.kpi-n{font-size:clamp(38px,4.5vw,54px);font-weight:800;line-height:1;margin-bottom:8px;}
.kpi-l{font-family:'Lora',serif;font-size:clamp(21px,1.6vw,23px);color:var(--muted);}

/* ── TIMELINE ── */
.tl{display:flex;flex-direction:column;gap:0;max-width:800px;width:100%;text-align:left;}
.tl-item{display:flex;gap:22px;padding:14px 0 14px 28px;border-left:2px solid rgba(56,232,200,.22);position:relative;}
.tl-item::before{content:'';position:absolute;left:-7px;top:22px;width:12px;height:12px;border-radius:50%;background:var(--teal);}
.tl-yr{font-family:'Inconsolata',monospace;font-size:22px;color:var(--teal);min-width:80px;flex-shrink:0;}
.tl-txt{font-family:'Lora',serif;font-size:clamp(22px,1.8vw,26px);color:#b8ccd8;line-height:1.4;}

/* ── WARNING BOX ── */
.warn{background:rgba(255,107,107,.07);border:1px solid rgba(255,107,107,.25);border-radius:12px;padding:24px 28px;max-width:820px;width:100%;text-align:left;}
.warn h4{color:var(--coral);font-size:clamp(24px,2.2vw,30px);margin-bottom:12px;}
.warn p{font-family:'Lora',serif;font-size:clamp(22px,1.8vw,26px);line-height:1.5;color:#e8c8c8;}

/* ── PROGRESS / NAV ── */
#progress-bar{position:fixed;bottom:0;left:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--gold));transition:width .4s ease;z-index:200;}
#counter{position:fixed;bottom:18px;right:26px;font-family:'Inconsolata',monospace;font-size:21px;color:var(--muted);z-index:200;}

.nav-btn{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);font-size:26px;width:50px;height:50px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;transition:background .2s,border-color .2s;}
.nav-btn:hover{background:rgba(56,232,200,.12);border-color:var(--teal);}
#prev{left:18px;}#next{right:18px;}

#dots{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:200;flex-wrap:wrap;max-width:600px;justify-content:center;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .3s,width .3s;cursor:pointer;flex-shrink:0;}
.dot.on{background:var(--teal);width:16px;border-radius:3px;}

/* ── SECTION DIVIDER SLIDE ── */
.divider-slide{background:linear-gradient(135deg,#0a1020 0%,#050810 100%);}
.divider-slide::before{background-image:radial-gradient(circle at 30% 70%,rgba(56,232,200,.1) 0%,transparent 55%),radial-gradient(circle at 70% 30%,rgba(240,192,64,.08) 0%,transparent 55%);}
.section-num{font-family:'Inconsolata',monospace;font-size:clamp(56px,9vw,90px);font-weight:600;color:rgba(56,232,200,.15);line-height:1;margin-bottom:8px;}

/* ── GLOW ── */
.glow{text-shadow:0 0 28px rgba(56,232,200,.45);}
.glow-g{text-shadow:0 0 28px rgba(240,192,64,.45);}
.glow-r{text-shadow:0 0 28px rgba(255,107,107,.45);}

/* ── EXERCISE BOX ── */
.ex{background:rgba(168,224,99,.06);border:1px solid rgba(168,224,99,.2);border-radius:12px;padding:22px 28px;max-width:820px;width:100%;text-align:left;}
.ex-label{font-family:'Inconsolata',monospace;font-size:22px;color:var(--lime);margin-bottom:10px;letter-spacing:2px;}
.ex p{font-family:'Lora',serif;font-size:clamp(22px,1.9vw,28px);color:#d0e8c8;line-height:1.5;}

/* ── DELIVERABLE BOX ── */
.del{background:rgba(116,185,255,.06);border:1px solid rgba(116,185,255,.2);border-radius:12px;padding:22px 28px;max-width:820px;width:100%;text-align:left;}
.del-label{font-family:'Inconsolata',monospace;font-size:22px;color:var(--sky);margin-bottom:10px;letter-spacing:2px;}
.del p{font-family:'Lora',serif;font-size:clamp(22px,1.9vw,28px);color:#c8d8f0;line-height:1.5;}

</style>
</head>
<body>

<div id="deck"></div>
<div id="progress-bar"></div>
<div id="counter"></div>
<div id="dots"></div>
<button class="nav-btn" id="prev">&#8592;</button>
<button class="nav-btn" id="next">&#8594;</button>

/* ═══════════════════════════════════════════════
   8.9 PITFALLS
═══════════════════════════════════════════════ */
{c:`
  <div class="section-num">8.9</div>
  <div class="h-main r glow-r">Common Pitfalls in<br>AI Transformation</div>
  <div class="body">Knowing what <strong>not to do</strong> is half the strategy.</div>
`,extra:'divider-slide'},

{c:`
  <div class="badge">8.9 — The Fatal Five</div>
  <div class="h-main r">Mistakes That<br>Kill Programs</div>
  <div class="rule r"></div>
  <ul class="lst">
    <li class="r">Treating AI as a side experiment with no strategic home</li>
    <li class="r">Lacking visible, consistent leadership buy-in</li>
    <li class="r">Deploying tools with no success metrics defined</li>
    <li class="r">Over-relying on AI output without human validation</li>
    <li class="r">Ignoring cultural resistance until it becomes sabotage</li>
  </ul>
`},

{c:`
  <div class="badge">8.9 — The Pilot Graveyard</div>
  <div class="h-sub t" style="margin-bottom:18px">Why Pilots Never Scale</div>
  <div class="body" style="margin-bottom:24px">Most organizations run successful pilots that <em>never leave the pilot stage</em>. The reasons are always the same:</div>
  <div class="two">
    <div class="box" style="border-color:rgba(255,107,107,.2)">
      <h3 class="r">Root Causes</h3>
      <ul><li>No named owner for scaling</li><li>Success not documented</li><li>Budget not allocated post-pilot</li><li>No integration plan</li></ul>
    </div>
    <div class="box" style="border-color:rgba(56,232,200,.2)">
      <h3 class="t">The Fix</h3>
      <ul><li>Assign a scale owner on Day 1</li><li>Define "scale criteria" upfront</li><li>Lock in Phase 2 budget before pilot ends</li><li>Build the integration plan in Phase 1</li></ul>
    </div>
  </div>
`},

{c:`
  <div class="badge">8.9 — Over-Reliance Warning</div>
  <div class="warn">
    <h4>⚠ The Automation Complacency Trap</h4>
    <p>As AI quality improves, humans reduce verification effort. This creates a compounding risk: <strong>errors propagate undetected</strong> through workflows. Build mandatory human checkpoints into every high-stakes AI process — and never remove them.</p>
  </div>
`},

{c:`
  <div class="badge">8.9 — Cultural Resistance</div>
  <div class="h-main g">When the Culture<br><span class="r">Fights Back</span></div>
  <div class="rule r"></div>
  <div class="body">Resistance is rational. Employees protecting their expertise, their identity, their job security. <strong>Do not dismiss it — diagnose it.</strong> Every resistant employee has a valid concern that leadership hasn't addressed. Find it. Fix it. Publicly.</div>
`},

// ── RENDER ──────────────────────────────────────────
const deck=document.getElementById('deck');
const bar=document.getElementById('progress-bar');
const counter=document.getElementById('counter');
const dotsEl=document.getElementById('dots');
let cur=0, busy=false;

S.forEach((s,i)=>{
  const d=document.createElement('div');
  d.className='slide'+(s.extra?' '+s.extra:'');
  d.innerHTML=s.c;
  if(i===0)d.classList.add('active');
  deck.appendChild(d);
  const dot=document.createElement('div');
  dot.className='dot'+(i===0?' on':'');
  dot.onclick=()=>go(i);
  dotsEl.appendChild(dot);
});

const allS=deck.querySelectorAll('.slide');
const allD=dotsEl.querySelectorAll('.dot');

function upd(){
  counter.textContent=`${cur+1} / ${S.length}`;
  bar.style.width=((cur+1)/S.length*100)+'%';
  allD.forEach((d,i)=>d.classList.toggle('on',i===cur));
}

function go(n){
  if(busy||n===cur)return; busy=true;
  const p=cur; cur=n;
  allS[p].classList.add('exit');
  allS[p].classList.remove('active');
  setTimeout(()=>{
    allS[p].classList.remove('exit');
    allS[cur].classList.add('active');
    upd();
    setTimeout(()=>{busy=false;},600);
  },300);
}

document.getElementById('next').onclick=()=>go((cur+1)%S.length);
document.getElementById('prev').onclick=()=>go((cur-1+S.length)%S.length);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')go((cur+1)%S.length);
  if(e.key==='ArrowLeft')go((cur-1+S.length)%S.length);
});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(dx<-50)go((cur+1)%S.length);
  if(dx>50)go((cur-1+S.length)%S.length);
});
upd();
</script>
