<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Co-Pilots in Every App</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inconsolata:wght@300;400;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #050810;
  --surface:  #0b1020;
  --border:   rgba(99,179,255,0.13);
  --sky:      #63b3ff;
  --lime:     #aaff5e;
  --amber:    #ffbe3d;
  --rose:     #ff6b8a;
  --lilac:    #c9b8ff;
  --text:     #dde8f5;
  --muted:    #6a82a0;
  --glow-sky: rgba(99,179,255,0.35);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Lora',serif;
  overflow:hidden;
  height:100vh;
  width:100vw;
}

/* ═══════════════════════════════ PARTICLE CANVAS */
#canvas{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:0;opacity:.55;
}

/* ═══════════════════════════════ DECK */
#deck{position:relative;width:100vw;height:100vh;z-index:1;}

.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding:56px 90px;
  opacity:0;pointer-events:none;
  transition:opacity .55s cubic-bezier(.4,0,.2,1),
             transform .55s cubic-bezier(.4,0,.2,1);
  transform:scale(.97) translateY(24px);
  text-align:center;
}
.slide.active{opacity:1;pointer-events:all;transform:scale(1) translateY(0);}
.slide.exit{opacity:0;transform:scale(1.02) translateY(-24px);}

/* subtle hex-dot texture per slide */
.slide::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle, rgba(99,179,255,.07) 1px, transparent 1px);
  background-size:38px 38px;
  pointer-events:none;z-index:0;
}
.slide>*{position:relative;z-index:1;}

/* ═══════════════════════════════ TYPOGRAPHY */
.eyebrow{
  font-family:'Inconsolata',monospace;
  font-size:21px;
  letter-spacing:5px;
  text-transform:uppercase;
  color:var(--sky);
  margin-bottom:18px;
  opacity:.9;
}

.hero{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:clamp(46px,7.5vw,88px);
  line-height:1.0;
  letter-spacing:-1px;
  margin-bottom:22px;
}

.title{
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:clamp(38px,5.5vw,62px);
  line-height:1.1;
  margin-bottom:22px;
  letter-spacing:-.5px;
}

.body{
  font-size:clamp(22px,2.1vw,32px);
  line-height:1.65;
  max-width:820px;
  color:#b8cfea;
  font-weight:400;
}
.body b{color:var(--text);font-weight:400;}
.body em{color:var(--lime);font-style:normal;}

.mono{
  font-family:'Inconsolata',monospace;
  font-size:clamp(22px,1.9vw,30px);
}

/* colors */
.sky{color:var(--sky);}
.lime{color:var(--lime);}
.amber{color:var(--amber);}
.rose{color:var(--rose);}
.lilac{color:var(--lilac);}

/* rules */
.rule{width:64px;height:3px;border-radius:2px;background:var(--sky);margin:0 auto 28px;}
.rule.lime{background:var(--lime);}
.rule.amber{background:var(--amber);}
.rule.rose{background:var(--rose);}
.rule.lilac{background:var(--lilac);}

/* ═══════════════════════════════ CARDS */
.card-row{
  display:flex;gap:20px;
  max-width:980px;width:100%;
  margin-top:10px;
}
.card{
  flex:1;
  background:rgba(99,179,255,.05);
  border:1px solid var(--border);
  border-radius:16px;
  padding:28px 22px;
  text-align:left;
  transition:border-color .25s;
}
.card:hover{border-color:rgba(99,179,255,.35);}
.card h3{
  font-family:'Syne',sans-serif;
  font-size:clamp(26px,2.4vw,36px);
  margin-bottom:12px;
  font-weight:700;
}
.card p{
  font-size:clamp(21px,1.7vw,26px);
  color:#8da8c8;
  line-height:1.5;
}

/* ═══════════════════════════════ LIST */
.flist{
  list-style:none;
  text-align:left;
  max-width:780px;width:100%;
}
.flist li{
  font-size:clamp(22px,2vw,30px);
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
  gap:18px;align-items:flex-start;
  line-height:1.4;color:#b8cfea;
}
.flist li::before{
  content:'◆';
  color:var(--sky);font-size:18px;
  flex-shrink:0;margin-top:5px;
}
.flist li span{color:var(--lime);}
.flist.rose li::before{color:var(--rose);}
.flist.amber li::before{color:var(--amber);}
.flist.lime li::before{color:var(--lime);}

/* ═══════════════════════════════ STAT GRID */
.stat-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  max-width:920px;width:100%;
  margin-top:14px;
}
.stat-card{
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:14px;
  padding:26px 18px;
  text-align:center;
}
.stat-num{
  font-family:'Syne',sans-serif;
  font-size:clamp(40px,5vw,58px);
  font-weight:800;
  color:var(--lime);
  line-height:1;
  margin-bottom:8px;
}
.stat-desc{
  font-size:clamp(20px,1.6vw,24px);
  color:var(--muted);
  line-height:1.4;
}

/* ═══════════════════════════════ CODE BOX */
.code-box{
  background:#060d1a;
  border:1px solid rgba(99,179,255,.2);
  border-radius:14px;
  padding:28px 34px;
  font-family:'Inconsolata',monospace;
  font-size:clamp(21px,1.75vw,27px);
  text-align:left;
  max-width:820px;width:100%;
  line-height:1.85;
}
.kw{color:var(--rose);}
.fn{color:var(--sky);}
.st{color:var(--lime);}
.cm{color:var(--muted);}
.num{color:var(--amber);}

/* ═══════════════════════════════ PILL */
.pills{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:860px;margin-top:10px;}
.pill{
  display:inline-block;
  padding:9px 22px;
  border-radius:100px;
  font-family:'Inconsolata',monospace;
  font-size:22px;
  border:1px solid;
}
.pill.sky{background:rgba(99,179,255,.1);border-color:rgba(99,179,255,.3);color:var(--sky);}
.pill.lime{background:rgba(170,255,94,.08);border-color:rgba(170,255,94,.28);color:var(--lime);}
.pill.amber{background:rgba(255,190,61,.08);border-color:rgba(255,190,61,.28);color:var(--amber);}
.pill.rose{background:rgba(255,107,138,.08);border-color:rgba(255,107,138,.28);color:var(--rose);}
.pill.lilac{background:rgba(201,184,255,.08);border-color:rgba(201,184,255,.28);color:var(--lilac);}

/* ═══════════════════════════════ QUOTE */
.quote-wrap{
  border-left:4px solid var(--amber);
  padding:26px 34px;
  text-align:left;
  max-width:820px;
  background:rgba(255,190,61,.04);
  border-radius:0 14px 14px 0;
}
.quote-wrap p{
  font-size:clamp(26px,2.5vw,36px);
  line-height:1.55;
  font-style:italic;
  color:var(--text);
  margin-bottom:14px;
}
.quote-wrap cite{
  font-family:'Inconsolata',monospace;
  font-size:22px;
  color:var(--amber);
  font-style:normal;
}

/* ═══════════════════════════════ APP SHOWCASE */
.app-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  max-width:920px;width:100%;
  margin-top:14px;
}
.app-card{
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:14px;
  padding:22px 18px;
  text-align:left;
}
.app-icon{font-size:clamp(34px,3.5vw,46px);margin-bottom:10px;line-height:1;}
.app-name{
  font-family:'Syne',sans-serif;
  font-size:clamp(24px,2vw,30px);
  font-weight:700;
  margin-bottom:8px;
}
.app-desc{
  font-size:clamp(20px,1.55vw,24px);
  color:var(--muted);
  line-height:1.45;
}

/* ═══════════════════════════════ BEFORE/AFTER */
.ba-grid{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:20px;
  align-items:center;
  max-width:960px;width:100%;
  margin-top:14px;
  text-align:left;
}
.ba-box{
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  border-radius:14px;
  padding:28px 24px;
}
.ba-box h3{
  font-family:'Syne',sans-serif;
  font-size:clamp(28px,2.5vw,38px);
  font-weight:700;
  margin-bottom:14px;
}
.ba-box ul{list-style:none;}
.ba-box ul li{
  font-size:clamp(21px,1.7vw,26px);
  color:#8da8c8;
  padding:6px 0;
  line-height:1.4;
}
.ba-box ul li::before{content:'→ ';color:var(--muted);}
.ba-arrow{
  font-size:clamp(36px,4vw,52px);
  color:var(--sky);
  text-align:center;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:.5;transform:scale(.9);}
}

/* ═══════════════════════════════ TIMELINE */
.tl{
  display:flex;flex-direction:column;
  gap:0;max-width:760px;width:100%;
  text-align:left;
}
.tl-row{
  display:flex;gap:24px;
  padding:14px 0 14px 26px;
  border-left:2px solid rgba(99,179,255,.25);
  position:relative;
}
.tl-row::before{
  content:'';position:absolute;
  left:-7px;top:22px;
  width:12px;height:12px;border-radius:50%;
  background:var(--sky);
}
.tl-yr{
  font-family:'Inconsolata',monospace;
  font-size:22px;color:var(--sky);
  min-width:72px;flex-shrink:0;
}
.tl-txt{
  font-size:clamp(21px,1.8vw,26px);
  color:#99b8d8;line-height:1.4;
}

/* ═══════════════════════════════ GLOW EFFECTS */
.glow{text-shadow:0 0 40px var(--glow-sky);}
.glow-lime{text-shadow:0 0 40px rgba(170,255,94,.4);}
.glow-amber{text-shadow:0 0 40px rgba(255,190,61,.4);}
.glow-rose{text-shadow:0 0 40px rgba(255,107,138,.4);}

/* ═══════════════════════════════ HUD LINE */
.hud{
  font-family:'Inconsolata',monospace;
  font-size:21px;
  color:var(--muted);
  margin-top:24px;
  letter-spacing:2px;
}
.hud span{color:var(--sky);}

/* ═══════════════════════════════ NAV */
#progress{
  position:fixed;bottom:0;left:0;
  height:3px;
  background:linear-gradient(90deg,var(--sky),var(--lilac));
  transition:width .5s ease;z-index:100;
}
#counter{
  position:fixed;bottom:22px;right:28px;
  font-family:'Inconsolata',monospace;
  font-size:22px;color:var(--muted);z-index:100;
}
.nav-btn{
  position:fixed;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);
  color:var(--text);font-size:26px;
  width:50px;height:50px;border-radius:50%;
  cursor:pointer;display:flex;
  align-items:center;justify-content:center;
  z-index:100;transition:background .2s,border-color .2s;
}
.nav-btn:hover{background:rgba(99,179,255,.1);border-color:var(--sky);}
#prev{left:18px;}
#next{right:18px;}
#dots{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;z-index:100;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--muted);cursor:pointer;
  transition:background .3s,width .3s;
}
.dot.on{background:var(--sky);width:18px;border-radius:3px;}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="deck"></div>
<div id="progress"></div>
<div id="counter"></div>
<div id="dots"></div>
<button class="nav-btn" id="prev">&#8592;</button>
<button class="nav-btn" id="next">&#8594;</button>

<script>
// ── FLOATING PARTICLES ─────────────────────────────
const cvs = document.getElementById('canvas');
const ctx = cvs.getContext('2d');
let W, H, pts=[];
function resize(){W=cvs.width=window.innerWidth;H=cvs.height=window.innerHeight;pts=[];for(let i=0;i<55;i++)pts.push({x:Math.random()*W,y:Math.random()*H,r:.8+Math.random()*1.6,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,a:Math.random()*Math.PI*2});}
window.addEventListener('resize',resize);resize();
function draw(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(99,179,255,${.15+.1*Math.sin(p.a)})`;ctx.fill();p.a+=.015;});pts.forEach((a,i)=>{for(let j=i+1;j<pts.length;j++){const b=pts[j];const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<140){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(99,179,255,${.06*(1-d/140)})`;ctx.lineWidth=.6;ctx.stroke();}}});requestAnimationFrame(draw);}
draw();

// ── SLIDES ─────────────────────────────────────────
const slides = [

// 01 TITLE
{html:`
  <div class="eyebrow">The New Software Paradigm</div>
  <div class="hero glow">AI <span class="lime">CO-PILOTS</span><br>IN EVERY APP</div>
  <div class="rule lime"></div>
  <div class="body">Every software tool you open today<br>now ships with an <em>intelligent layer built in</em></div>
  <div class="hud">2024 → 2025 → <span>Beyond</span></div>
`},

// 02 THE CORE IDEA
{html:`
  <div class="eyebrow">Core Idea</div>
  <div class="title">AI Is No Longer a <span class="sky">Separate Tool</span></div>
  <div class="rule"></div>
  <div class="body">It used to live in a chatbot tab.<br>Now it's woven <b>directly into the interface</b> — the spreadsheet, the doc, the IDE, the design canvas. <em>The app is the AI.</em></div>
`},

// 03 TIMELINE
{html:`
  <div class="eyebrow">How We Got Here</div>
  <div class="title amber glow-amber">A Rapid <span class="text">Evolution</span></div>
  <div class="rule amber"></div>
  <div class="tl">
    <div class="tl-row"><span class="tl-yr" style="color:var(--muted)">2019</span><span class="tl-txt">AI as standalone chatbots — separate, siloed, novelty</span></div>
    <div class="tl-row"><span class="tl-yr">2021</span><span class="tl-txt">GitHub Copilot previews code autocomplete inside VS Code</span></div>
    <div class="tl-row"><span class="tl-yr">2023</span><span class="tl-txt">Microsoft, Google, Notion embed AI across their full suites</span></div>
    <div class="tl-row" style="border-color:rgba(170,255,94,.4)"><span class="tl-yr" style="color:var(--lime)">Now</span><span class="tl-txt" style="color:var(--text)">Every major SaaS product ships with a native AI co-pilot layer</span></div>
  </div>
`},

// 04 WHAT IS A COPILOT?
{html:`
  <div class="eyebrow">Definition</div>
  <div class="title">What Exactly Is an <span class="sky">AI Co-Pilot?</span></div>
  <div class="rule"></div>
  <div class="body" style="margin-bottom:24px;">A co-pilot is an AI layer <b>embedded inside a product</b> that understands the context of your work and can act, generate, summarize, or suggest — <em>without leaving the app.</em></div>
  <div class="code-box">
    <span class="cm">// The anatomy of a co-pilot</span><br>
    <span class="kw">context</span> = <span class="st">your_current_file + history</span><br>
    <span class="kw">intent</span>  = <span class="st">what you type or select</span><br>
    <span class="fn">copilot</span>(<span class="kw">context</span>, <span class="kw">intent</span>) → <span class="st">action</span>
  </div>
`},

// 05 MICROSOFT COPILOT
{html:`
  <div class="eyebrow">Ecosystem: Microsoft</div>
  <div class="title"><span class="sky">Microsoft</span> Copilot — Everywhere</div>
  <div class="rule"></div>
  <div class="app-grid">
    <div class="app-card">
      <div class="app-icon">📊</div>
      <div class="app-name sky">Excel</div>
      <div class="app-desc">Analyze data, build formulas, generate charts from plain English</div>
    </div>
    <div class="app-card">
      <div class="app-icon">📝</div>
      <div class="app-name sky">Word</div>
      <div class="app-desc">Draft, rewrite, summarize, and transform any document</div>
    </div>
    <div class="app-card">
      <div class="app-icon">💬</div>
      <div class="app-name sky">Teams</div>
      <div class="app-desc">Recap meetings, action items, and catch you up in seconds</div>
    </div>
  </div>
  <div class="hud" style="margin-top:20px;">Embedded across <span>365 apps</span> — one subscription, omnipresent intelligence</div>
`},

// 06 GITHUB COPILOT
{html:`
  <div class="eyebrow">Ecosystem: Developer Tools</div>
  <div class="title"><span class="lime">GitHub Copilot</span> — Code Reborn</div>
  <div class="rule lime"></div>
  <div class="body" style="margin-bottom:24px;">The first mainstream AI co-pilot. 1.3 million paid users by 2023. It <em>writes functions from comments, completes logic mid-keystroke,</em> and explains unfamiliar codebases.</div>
  <div class="code-box">
    <span class="cm">// Developer types this comment:</span><br>
    <span class="cm">// fetch user data and handle errors</span><br><br>
    <span class="cm">// Copilot writes this instantly:</span><br>
    <span class="kw">async function</span> <span class="fn">getUser</span>(id) {<br>
    &nbsp;&nbsp;<span class="kw">try</span> { <span class="kw">return await</span> <span class="fn">api</span>.<span class="fn">get</span>(<span class="st">'/users/' + id</span>); }<br>
    &nbsp;&nbsp;<span class="kw">catch</span>(e) { <span class="fn">handleError</span>(e); }<br>
    }
  </div>
`},

// 07 NOTION AI
{html:`
  <div class="eyebrow">Ecosystem: Productivity</div>
  <div class="title"><span class="lilac">Notion AI</span> — Your Doc Thinks Now</div>
  <div class="rule lilac"></div>
  <div class="card-row">
    <div class="card" style="border-color:rgba(201,184,255,.2)">
      <h3 class="lilac">Generate</h3>
      <p>Turn a bullet into a full proposal. Type a topic, get a structured document with headers and examples.</p>
    </div>
    <div class="card" style="border-color:rgba(201,184,255,.2)">
      <h3 class="lilac">Summarize</h3>
      <p>Paste a 30-page report. Get the five things that actually matter, formatted and ready to share.</p>
    </div>
    <div class="card" style="border-color:rgba(201,184,255,.2)">
      <h3 class="lilac">Ask</h3>
      <p>Query your entire workspace like a database: "What did the team decide about Q3 pricing?"</p>
    </div>
  </div>
`},

// 08 FIGMA AI
{html:`
  <div class="eyebrow">Ecosystem: Design</div>
  <div class="title"><span class="rose">Figma AI</span> — Design from Words</div>
  <div class="rule rose"></div>
  <div class="body" style="margin-bottom:26px;">Designers once spent hours building wireframes from briefs. Now they <em>type the brief</em> — and a full UI layout appears. Figma's AI layer generates components, auto-names layers, and rewrites copy inline.</div>
  <ul class="flist rose" style="max-width:700px;">
    <li>Text → Full wireframe in seconds</li>
    <li>Auto-layout suggestions for responsive design</li>
    <li>Copy rewrite directly inside text layers</li>
    <li>Prototype flows generated from user stories</li>
  </ul>
`},

// 09 GOOGLE GEMINI
{html:`
  <div class="eyebrow">Ecosystem: Google</div>
  <div class="title"><span class="amber">Google Gemini</span> — The Workspace Brain</div>
  <div class="rule amber"></div>
  <div class="app-grid">
    <div class="app-card">
      <div class="app-icon">📧</div>
      <div class="app-name amber">Gmail</div>
      <div class="app-desc">Draft replies, summarize threads, detect action items automatically</div>
    </div>
    <div class="app-card">
      <div class="app-icon">📋</div>
      <div class="app-name amber">Sheets</div>
      <div class="app-desc">Ask questions about your data in plain English, get formulas and charts</div>
    </div>
    <div class="app-card">
      <div class="app-icon">🎤</div>
      <div class="app-name amber">Meet</div>
      <div class="app-desc">Real-time transcription, note-taking, and meeting summaries on autopilot</div>
    </div>
  </div>
`},

// 10 CAPABILITY — DOCUMENT GENERATION
{html:`
  <div class="eyebrow">Capability 1 of 4</div>
  <div class="title sky glow">Auto-Generate <span class="text">Documents</span></div>
  <div class="rule"></div>
  <div class="body" style="margin-bottom:22px;">You describe intent. The co-pilot drafts the artifact. The shift: <em>authorship becomes direction.</em></div>
  <ul class="flist" style="max-width:740px;">
    <li>Business proposals from a single prompt</li>

// ── RENDER ──────────────────────────────────────────
const deck=document.getElementById('deck');
const bar=document.getElementById('progress');
const ctr=document.getElementById('counter');
const dotsEl=document.getElementById('dots');
let cur=0,busy=false;

slides.forEach((s,i)=>{
  const d=document.createElement('div');
  d.className='slide'+(i===0?' active':'');
  d.innerHTML=s.html;
  deck.appendChild(d);
  const dot=document.createElement('div');
  dot.className='dot'+(i===0?' on':'');
  dot.onclick=()=>goTo(i);
  dotsEl.appendChild(dot);
});

const allSlides=deck.querySelectorAll('.slide');
const allDots=dotsEl.querySelectorAll('.dot');

function ui(){
  ctr.textContent=`${cur+1} / ${slides.length}`;
  bar.style.width=((cur+1)/slides.length*100)+'%';
  allDots.forEach((d,i)=>d.classList.toggle('on',i===cur));
}

function goTo(n){
  if(busy||n===cur)return;busy=true;
  const p=cur;cur=n;
  allSlides[p].classList.add('exit');
  allSlides[p].classList.remove('active');
  setTimeout(()=>{
    allSlides[p].classList.remove('exit');
    allSlides[cur].classList.add('active');
    ui();
    setTimeout(()=>{busy=false;},600);
  },280);
}

const next=()=>goTo((cur+1)%slides.length);
const prev=()=>goTo((cur-1+slides.length)%slides.length);
document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev();});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(dx<-50)next();if(dx>50)prev();});
ui();
</script>
