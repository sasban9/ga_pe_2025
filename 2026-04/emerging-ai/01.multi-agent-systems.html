
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Multi-Agent Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #04070f;
  --panel:    rgba(255,255,255,0.035);
  --border:   rgba(0,210,255,0.18);
  --a1:       #00d2ff;   /* electric cyan   */
  --a2:       #ff6b35;   /* ember orange    */
  --a3:       #7cff6b;   /* neon green      */
  --a4:       #c77dff;   /* violet          */
  --a5:       #ffd166;   /* golden          */
  --text:     #dce8f5;
  --dim:      #6a8499;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  overflow: hidden;
  height: 100vh; width: 100vw;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
#cursor {
  position: fixed;
  width: 18px; height: 18px;
  border: 2px solid var(--a1);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.15s ease;
  mix-blend-mode: screen;
}
#cursor-dot {
  position: fixed;
  width: 4px; height: 4px;
  background: var(--a1);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
}

/* ── CANVAS BACKGROUND ── */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.5;
}

/* ── DECK ── */
#deck {
  position: relative;
  width: 100vw; height: 100vh;
  z-index: 1;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 56px 80px;
  opacity: 0;
  pointer-events: none;
  transform: scale(0.97) translateY(20px);
  transition: opacity 0.55s cubic-bezier(.4,0,.2,1),
              transform 0.55s cubic-bezier(.4,0,.2,1);
  text-align: center;
}
.slide.active {
  opacity: 1;
  pointer-events: all;
  transform: scale(1) translateY(0);
}
.slide.exit {
  opacity: 0;
  transform: scale(1.02) translateY(-20px);
}

/* ── TYPE SCALE ── */
.label {
  font-family: 'Fira Code', monospace;
  font-size: 21px;
  color: var(--a1);
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 18px;
  opacity: 0.8;
}

.title {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(46px, 7vw, 82px);
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -1px;
  margin-bottom: 22px;
}

.headline {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(36px, 5vw, 58px);
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 22px;
}

.sub {
  font-size: clamp(22px, 2.2vw, 32px);
  line-height: 1.65;
  max-width: 860px;
  color: #b8d0e4;
  font-weight: 300;
}
.sub strong { color: var(--a1); font-weight: 600; }
.sub em     { color: var(--a5); font-style: normal; font-weight: 600; }

.mono {
  font-family: 'Fira Code', monospace;
  font-size: clamp(21px, 1.8vw, 28px);
}

/* ── COLORS ── */
.c1{color:var(--a1)}.c2{color:var(--a2)}.c3{color:var(--a3)}
.c4{color:var(--a4)}.c5{color:var(--a5)}
.glow1{text-shadow:0 0 28px rgba(0,210,255,.55)}
.glow2{text-shadow:0 0 28px rgba(255,107,53,.55)}
.glow3{text-shadow:0 0 28px rgba(124,255,107,.55)}

/* ── RULE ── */
.rule { width:72px; height:3px; border-radius:2px; background:var(--a1); margin:0 auto 28px; }
.rule.o{background:var(--a2)}.rule.g{background:var(--a3)}.rule.v{background:var(--a4)}.rule.y{background:var(--a5)}

/* ── AGENT CARD GRID ── */
.agent-grid {
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:14px;
  max-width:980px;
  width:100%;
  margin-top:12px;
}
.agent-card {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:22px 14px 18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  transition:border-color .25s, box-shadow .25s;
}
.agent-card:hover { border-color:var(--a1); box-shadow:0 0 20px rgba(0,210,255,.18); }
.agent-icon { font-size: 38px; line-height:1; }
.agent-name {
  font-family:'Orbitron',sans-serif;
  font-size: 21px;
  font-weight:700;
  color:var(--a1);
  text-align:center;
}
.agent-role {
  font-size: 21px;
  color:#8fa8bc;
  text-align:center;
  line-height:1.3;
}

/* ── FRAMEWORK PILLS ── */
.fw-grid {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:14px;
  max-width:860px;
  margin-top:14px;
}
.fw-pill {
  background:rgba(0,210,255,0.07);
  border:1px solid rgba(0,210,255,0.25);
  color:var(--a1);
  font-family:'Fira Code',monospace;
  font-size:23px;
  padding:12px 28px;
  border-radius:8px;
  letter-spacing:1px;
  transition:background .2s, box-shadow .2s;
}
.fw-pill:hover { background:rgba(0,210,255,0.15); box-shadow:0 0 16px rgba(0,210,255,.25); }
.fw-pill.o { background:rgba(255,107,53,.07); border-color:rgba(255,107,53,.3); color:var(--a2); }
.fw-pill.o:hover { background:rgba(255,107,53,.15); box-shadow:0 0 16px rgba(255,107,53,.25); }
.fw-pill.g { background:rgba(124,255,107,.07); border-color:rgba(124,255,107,.3); color:var(--a3); }
.fw-pill.v { background:rgba(199,125,255,.07); border-color:rgba(199,125,255,.3); color:var(--a4); }
.fw-pill.y { background:rgba(255,209,102,.07); border-color:rgba(255,209,102,.3); color:var(--a5); }

/* ── FLOW DIAGRAM ── */
.flow-row {
  display:flex;
  align-items:center;
  gap:0;
  max-width:960px;
  width:100%;
  margin-top:14px;
}
.flow-node {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px 16px;
  flex:1;
  text-align:center;
}
.flow-node .fn-title {
  font-family:'Orbitron',sans-serif;
  font-size: clamp(21px,1.8vw,26px);
  color:var(--a1);
  margin-bottom:6px;
}
.flow-node .fn-body { font-size:21px; color:#8fa8bc; line-height:1.3; }
.flow-arr {
  font-size: 32px;
  color:var(--a1);
  padding:0 8px;
  flex-shrink:0;
  animation: flarr 1.6s infinite;
}
@keyframes flarr { 0%,100%{opacity:1;transform:translateX(0)} 50%{opacity:.4;transform:translateX(5px)} }

/* ── USE CASE LIST ── */
.uc-list {
  list-style:none;
  max-width:800px;
  width:100%;
  text-align:left;
}
.uc-list li {
  font-size:clamp(22px,2vw,30px);
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex;
  align-items:flex-start;
  gap:18px;
  color:#b8d0e4;
  line-height:1.4;
}
.uc-list li .bullet { color:var(--a3); flex-shrink:0; font-size:26px; margin-top:1px; }
.uc-list li strong { color:#fff; }
.uc-list li span   { color:var(--a5); }

/* ── TWO COL ── */
.two-col {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  max-width:960px;
  width:100%;
  text-align:left;
}
.tcol {
  background:var(--panel);
  border-radius:14px;
  padding:30px 26px;
}
.tcol h3 {
  font-family:'Orbitron',sans-serif;
  font-size:clamp(28px,2.6vw,38px);
  margin-bottom:14px;
  letter-spacing:.5px;
}
.tcol p { font-size:clamp(21px,1.7vw,26px); color:#8fa8bc; line-height:1.55; }

/* ── CODE BOX ── */
.code-box {
  background:#060d16;
  border:1px solid rgba(0,210,255,0.2);
  border-radius:14px;
  padding:26px 34px;
  font-family:'Fira Code',monospace;
  font-size:clamp(21px,1.7vw,26px);
  text-align:left;
  max-width:840px;
  width:100%;
  line-height:1.9;
}
.kw{color:var(--a2)} .fn{color:var(--a1)} .st{color:var(--a5)} .cm{color:var(--dim)} .tp{color:var(--a3)}

/* ── STAT GRID ── */
.stat-row {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
  max-width:880px;
  width:100%;
  margin-top:14px;
}
.stat-card {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:26px 18px;
  text-align:center;
}
.stat-num {
  font-family:'Orbitron',sans-serif;
  font-size:clamp(40px,4.5vw,56px);
  color:var(--a1);
  line-height:1;
  margin-bottom:8px;
}
.stat-desc { font-size:clamp(20px,1.6vw,24px); color:var(--dim); line-height:1.3; }

/* ── BIG SHIFT ── */
.shift-row {
  display:flex;
  align-items:center;
  gap:32px;
  margin:20px 0;
}
.shift-box {
  background:var(--panel);
  border-radius:14px;
  padding:22px 30px;
  font-family:'Orbitron',sans-serif;
  font-size:clamp(24px,2.5vw,36px);
  font-weight:700;
  line-height:1.2;
  text-align:center;
}
.shift-arrow {
  font-size:clamp(36px,4vw,52px);
  color:var(--a1);
  animation: flarr 1.6s infinite;
  flex-shrink:0;
}

/* ── QUOTE ── */
.q-block {
  border-left:4px solid var(--a5);
  background:rgba(255,209,102,.04);
  border-radius:0 14px 14px 0;
  padding:26px 36px;
  text-align:left;
  max-width:820px;
}
.q-block p {
  font-size:clamp(26px,2.6vw,38px);
  font-style:italic;
  line-height:1.55;
  color:var(--text);
  margin-bottom:14px;
}
.q-block cite { font-family:'Fira Code',monospace; font-size:22px; color:var(--a5); font-style:normal; }

/* ── TIMELINE ── */
.timeline { max-width:780px; width:100%; text-align:left; }
.tl-item {
  display:flex;
  gap:22px;
  padding:14px 0 14px 26px;
  border-left:2px solid rgba(0,210,255,.2);
  position:relative;
}
.tl-item::before {
  content:'';
  position:absolute;
  left:-7px; top:22px;
  width:12px; height:12px;
  border-radius:50%;
  background:var(--a1);
  box-shadow:0 0 8px var(--a1);
}
.tl-tag {
  font-family:'Fira Code',monospace;
  font-size:22px;
  color:var(--a1);
  min-width:130px;
  flex-shrink:0;
}
.tl-txt { font-size:clamp(21px,1.8vw,26px); color:#a0b8cc; line-height:1.45; }

/* ── NAV ── */
.nav-btn {
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,210,255,.06);
  border:1px solid rgba(0,210,255,.15);
  color:var(--a1);
  font-size:26px;
  width:50px; height:50px;
  border-radius:50%;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
  transition:background .2s, box-shadow .2s;
}
.nav-btn:hover { background:rgba(0,210,255,.15); box-shadow:0 0 18px rgba(0,210,255,.3); }
#prev{left:18px} #next{right:18px}

/* ── PROGRESS ── */
#prog {
  position:fixed;
  bottom:0;
  left:0;
  height:3px;
  background:linear-gradient(90deg,var(--a1),var(--a4));
  transition:width .5s ease;
  z-index:100;
  box-shadow:0 0 8px var(--a1);
}

/* ── COUNTER ── */
#ctr {
  position:fixed;
  bottom:18px;
  right:24px;
  font-family:'Fira Code',monospace;
  font-size:21px;
  color:var(--dim);
  z-index:100;
}

/* ── DOTS ── */
#dots {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:6px;
  z-index:100;
}
.dot { width:6px; height:6px; border-radius:50%; background:var(--dim); cursor:pointer; transition:background .3s, width .3s; }
.dot.on { background:var(--a1); width:18px; border-radius:3px; box-shadow:0 0 6px var(--a1); }

/* ── SLIDE SECTION TAG ── */
#section-tag {
  position:fixed;
  top:22px;
  left:28px;
  font-family:'Fira Code',monospace;
  font-size:20px;
  color:var(--dim);
  z-index:100;
  letter-spacing:2px;
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="cursor"></div>
<div id="cursor-dot"></div>
<div id="section-tag"></div>
<div id="deck"></div>
<div id="prog"></div>
<div id="ctr"></div>
<div id="dots"></div>
<button class="nav-btn" id="prev">&#8592;</button>
<button class="nav-btn" id="next">&#8594;</button>

<script>
/* ── ANIMATED NETWORK BACKGROUND ── */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, nodes = [], animId;

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initNodes(n=60) {
  nodes = [];
  for (let i=0;i<n;i++) nodes.push({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-.5)*.4, vy: (Math.random()-.5)*.4,
    r: Math.random()*2.5+1
  });
}

function drawNet() {
  ctx.clearRect(0,0,W,H);
  nodes.forEach(n => { n.x+=n.vx; n.y+=n.vy; if(n.x<0||n.x>W)n.vx*=-1; if(n.y<0||n.y>H)n.vy*=-1; });
  for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++) {
    const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<160) {
      ctx.beginPath();
      ctx.moveTo(nodes[i].x,nodes[i].y);
      ctx.lineTo(nodes[j].x,nodes[j].y);
      ctx.strokeStyle=`rgba(0,210,255,${(1-d/160)*0.18})`;
      ctx.lineWidth=.8;
      ctx.stroke();
    }
  }
  nodes.forEach(n => {
    ctx.beginPath();
    ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,210,255,0.55)';
    ctx.fill();
  });
  animId = requestAnimationFrame(drawNet);
}

resizeCanvas(); initNodes(); drawNet();
window.addEventListener('resize', ()=>{ resizeCanvas(); initNodes(); });

/* ── CURSOR ── */
const cur=document.getElementById('cursor'), cdot=document.getElementById('cursor-dot');
document.addEventListener('mousemove',e=>{
  cur.style.left=(e.clientX-9)+'px'; cur.style.top=(e.clientY-9)+'px';
  cdot.style.left=(e.clientX-2)+'px'; cdot.style.top=(e.clientY-2)+'px';
});

/* ── SLIDES DATA ── */
const slides = [
/* 01 TITLE */
{ tag:'INTRO',
  html:`
    <div class="label">Deep Dive Series · 2025</div>
    <div class="title c1 glow1">AI MULTI-<br>AGENT<br><span class="c2 glow2">SYSTEMS</span></div>
    <div class="sub" style="font-size:clamp(23px,2.2vw,30px);margin-top:12px;">When one AI isn't enough — <em>build a team of them</em></div>
  `},

/* 02 CORE IDEA */
{ tag:'CORE IDEA',
  html:`
    <div class="label">The Core Concept</div>
    <div class="headline">One Problem. <span class="c1">Many Agents.</span></div>
    <div class="rule"></div>
    <div class="sub">Instead of a <strong>single AI</strong> trying to do everything, multiple <em>specialized agents</em> collaborate like a high-performance team — each an expert in its slice of the problem.</div>
  `},

/* 03 OLD VS NEW */
{ tag:'PARADIGM SHIFT',
  html:`
    <div class="label">The Paradigm Shift</div>
    <div class="headline c5">Old World <span class="c1">vs</span> New World</div>
    <div class="rule y"></div>
    <div class="two-col" style="margin-top:8px;">
      <div class="tcol" style="border:1px solid rgba(255,107,53,.18)">
        <h3 class="c2">Single Agent</h3>
        <p>One model. One prompt. One output. Limited by context window, generalism, and serial bottlenecks.</p>
      </div>
      <div class="tcol" style="border:1px solid rgba(0,210,255,.18)">
        <h3 class="c1">Multi-Agent</h3>
        <p>Parallel specialists. Shared memory. Dynamic routing. Each agent owns its domain — together they own the workflow.</p>
      </div>
    </div>
  `},

/* 04 THE KEY SHIFT */
{ tag:'KEY SHIFT',
  html:`
    <div class="label">The Fundamental Shift</div>
    <div class="headline" style="margin-bottom:28px;">From <span class="c2">Prompt → Output</span></div>
    <div class="shift-row">
      <div class="shift-box" style="border:1px solid rgba(255,107,53,.25);color:var(--a2)">Prompt<br><span style="font-size:22px;color:var(--dim);font-family:'Exo 2'">single call</span></div>
      <div class="shift-arrow">→</div>
      <div class="shift-box" style="border:1px solid rgba(0,210,255,.25);color:var(--a1)">System of<br>Agents</div>
      <div class="shift-arrow">→</div>
      <div class="shift-box" style="border:1px solid rgba(124,255,107,.25);color:var(--a3)">Workflow</div>
      <div class="shift-arrow">→</div>
      <div class="shift-box" style="border:1px solid rgba(255,209,102,.25);color:var(--a5)">Output</div>
    </div>
    <div class="sub" style="margin-top:22px;font-size:clamp(22px,1.9vw,28px);">The <strong>workflow</strong> replaces the prompt as the unit of AI work.</div>
  `},

/* 05 AGENT ROSTER */
{ tag:'AGENT TYPES',
  html:`
    <div class="label">The Agent Team</div>
    <div class="headline c1">Meet Your <span class="c3">AI Crew</span></div>
    <div class="rule g"></div>
    <div class="agent-grid">
      <div class="agent-card">
        <div class="agent-icon">🧭</div>
        <div class="agent-name">PLANNER</div>
        <div class="agent-role">Breaks problem into steps</div>
      </div>
      <div class="agent-card" style="border-color:rgba(255,107,53,.25)">
        <div class="agent-icon">🔍</div>
        <div class="agent-name" style="color:var(--a2)">RESEARCH</div>
        <div class="agent-role">Gathers data from the world</div>
      </div>
      <div class="agent-card" style="border-color:rgba(124,255,107,.25)">
        <div class="agent-icon">⚙️</div>
        <div class="agent-name" style="color:var(--a3)">EXECUTOR</div>
        <div class="agent-role">Writes code, text, analysis</div>
      </div>
      <div class="agent-card" style="border-color:rgba(199,125,255,.25)">
        <div class="agent-icon">🔬</div>
        <div class="agent-name" style="color:var(--a4)">REVIEWER</div>
        <div class="agent-role">QA, critique, fact-check</div>
      </div>
      <div class="agent-card" style="border-color:rgba(255,209,102,.25)">
        <div class="agent-icon">🧠</div>
        <div class="agent-name" style="color:var(--a5)">MEMORY</div>
        <div class="agent-role">Stores & retrieves context</div>
      </div>
    </div>
  `},

/* 06 PLANNER AGENT */
{ tag:'AGENT: PLANNER',
  html:`
    <div class="label">Agent Deep Dive · 1 of 5</div>
    <div class="headline">🧭 The <span class="c1">Planner Agent</span></div>
    <div class="rule"></div>
    <div class="sub" style="margin-bottom:22px;">The <strong>orchestrator brain</strong>. Receives a high-level goal, decomposes it into executable sub-tasks, and delegates to specialist agents.</div>
    <div class="code-box">
      <span class="cm">// Planner receives a goal</span><br>
      <span class="kw">input:</span>  <span class="st">"Write a market analysis for EV sector"</span><br>
      <span class="kw">output:</span> [<br>
      &nbsp;&nbsp;<span class="tp">task_1</span>: <span class="st">"Research EV market data"</span> → research_agent<br>
      &nbsp;&nbsp;<span class="tp">task_2</span>: <span class="st">"Analyze competitors"</span> → executor_agent<br>
      &nbsp;&nbsp;<span class="tp">task_3</span>: <span class="st">"Compile &amp; review"</span> → reviewer_agent<br>
      ]
    </div>
  `},

/* 07 RESEARCH AGENT */
{ tag:'AGENT: RESEARCH',
  html:`
    <div class="label">Agent Deep Dive · 2 of 5</div>
    <div class="headline">🔍 The <span class="c2">Research Agent</span></div>
    <div class="rule o"></div>
    <div class="sub">Equipped with <strong>tools</strong> — web search, APIs, databases, document stores. It doesn't guess; it <em>fetches real data</em> and returns structured findings to the pipeline.</div>

/* ── RENDER SLIDES ── */
const deck = document.getElementById('deck');
const prog = document.getElementById('prog');
const ctr  = document.getElementById('ctr');
const dotsEl = document.getElementById('dots');
const sectionTag = document.getElementById('section-tag');
let current = 0, transitioning = false;

slides.forEach((s,i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i===0?' active':'');
  div.innerHTML = s.html;
  deck.appendChild(div);

  const dot = document.createElement('div');
  dot.className = 'dot'+(i===0?' on':'');
  dot.onclick = () => goTo(i);
  dotsEl.appendChild(dot);
});

const allSlides = deck.querySelectorAll('.slide');
const allDots   = dotsEl.querySelectorAll('.dot');

function updateUI() {
  ctr.textContent = `${String(current+1).padStart(2,'0')} / ${slides.length}`;
  prog.style.width = ((current+1)/slides.length*100)+'%';
  allDots.forEach((d,i)=>d.classList.toggle('on',i===current));
  sectionTag.textContent = slides[current].tag || '';
}

function goTo(n) {
  if (transitioning || n===current) return;
  transitioning = true;
  const prev = current; current = n;
  allSlides[prev].classList.add('exit');
  allSlides[prev].classList.remove('active');
  setTimeout(() => {
    allSlides[prev].classList.remove('exit');
    allSlides[current].classList.add('active');
    updateUI();
    setTimeout(()=>{ transitioning=false; }, 600);
  }, 280);
}

const next = () => goTo((current+1)%slides.length);
const prev = () => goTo((current-1+slides.length)%slides.length);

document.getElementById('next').onclick = next;
document.getElementById('prev').onclick = prev;
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key===' ') next();
  if (e.key==='ArrowLeft') prev();
});

let tx=0;
document.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; });
document.addEventListener('touchend',   e=>{ const d=e.changedTouches[0].clientX-tx; if(d<-50)next(); if(d>50)prev(); });

updateUI();
</script>
