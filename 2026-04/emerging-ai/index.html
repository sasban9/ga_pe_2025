<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI Paradigm Shift | The 5 Trends Convergence — Extensible Slideshow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c10;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      color: #eef2ff;
    }

    /* main slideshow container */
    .slideshow-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 10%, #10141c, #030507);
      overflow: hidden;
    }

    /* animated background glow */
    .bg-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(ellipse at 40% 50%, rgba(60, 80, 140, 0.1) 0%, transparent 70%);
      animation: slowDrift 24s infinite alternate ease-in-out;
    }
    @keyframes slowDrift {
      0% { transform: translate(0%, 0%) rotate(0deg); opacity: 0.4; }
      100% { transform: translate(5%, 8%) rotate(3deg); opacity: 0.8; }
    }

    /* slide wrapper */
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.85s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0s linear 0.85s;
      z-index: 5;
      backdrop-filter: blur(2px);
      overflow-y: auto;
      padding: 2rem;
    }
    .slide::-webkit-scrollbar {
      width: 5px;
    }
    .slide::-webkit-scrollbar-track {
      background: #1e1f2c;
    }
    .slide::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 10px;
    }

    .slide.active {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.85s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0s linear 0s;
      z-index: 10;
    }

    /* card style — extensible & image-ready */
    .card {
      max-width: 1200px;
      width: 90%;
      background: rgba(12, 18, 28, 0.75);
      backdrop-filter: blur(14px);
      border-radius: 2.5rem;
      padding: 2.5rem 3rem;
      border: 1px solid rgba(80, 120, 200, 0.3);
      box-shadow: 0 30px 45px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(70, 130, 255, 0.1) inset;
      transition: transform 0.3s ease;
    }

    /* flexible image slot */
    .image-slot {
      margin: 1.5rem 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 1.8rem;
      padding: 0.8rem;
      border: 1px dashed rgba(59,130,246,0.5);
      min-height: 140px;
    }
    .image-slot img {
      max-width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 1.2rem;
      transition: transform 0.2s;
    }
    .image-slot img:hover {
      transform: scale(1.01);
    }
    .placeholder-icon {
      font-size: 2.8rem;
      opacity: 0.6;
      font-weight: 300;
      letter-spacing: 2px;
      background: rgba(59,130,246,0.15);
      padding: 0.6rem 1.8rem;
      border-radius: 2rem;
      color: #9bb9ff;
    }

    /* typography — all larger than 20pt (1pt = 1/72 inch, 20pt ~ 26.67px, we use rem/vw) */
    .main-title {
      font-size: 3.4rem;    /* ~54px > 20pt */
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #FFFFFF, #b0c4ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
      line-height: 1.2;
    }
    .trend-headline {
      font-size: 2.2rem;    /* ~35px */
      font-weight: 600;
      color: #b9d0ff;
      margin-bottom: 1rem;
      border-left: 5px solid #3b82f6;
      padding-left: 1.2rem;
    }
    .description {
      font-size: 1.6rem;    /* ~25.6px */
      line-height: 1.45;
      font-weight: 450;
      color: #eef2ffdd;
      margin: 1rem 0;
    }
    .connective {
      font-size: 1.5rem;
      background: rgba(59,130,246,0.2);
      padding: 0.7rem 1.6rem;
      border-radius: 3rem;
      display: inline-block;
      margin: 0.8rem 0;
      font-weight: 500;
    }
    .evolution-badge {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(120deg, #2b2f4e, #13172b);
      padding: 0.8rem 1.8rem;
      border-radius: 3rem;
      display: inline-block;
      margin-top: 0.8rem;
      border: 1px solid #3b82f6;
      color: #e2eaff;
    }
    .small-note {
      font-size: 1.2rem;
      color: #9aa9c1;
      margin-top: 0.8rem;
    }
    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: center;
      justify-content: space-between;
    }
    .text-content {
      flex: 2;
      min-width: 200px;
    }
    .image-slot {
      flex: 1;
      min-width: 180px;
    }

    /* controls */
    .controls {
      position: fixed;
      bottom: 28px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 30;
    }
    button {
      background: rgba(20, 28, 40, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(59,130,246,0.6);
      color: white;
      font-size: 1.4rem;
      font-weight: 600;
      padding: 10px 28px;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    button:hover {
      background: #1e2a4a;
      border-color: #3b82f6;
      transform: scale(1.02);
    }
    .slide-counter {
      position: fixed;
      top: 24px;
      right: 28px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 8px 18px;
      border-radius: 80px;
      font-size: 1.2rem;
      font-weight: 500;
      z-index: 30;
      border: 1px solid #2d4059;
      color: #bbd9ff;
    }
    .progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 5px;
      background: linear-gradient(90deg, #3b82f6, #a855f7);
      width: 0%;
      transition: width 0.2s linear;
      z-index: 40;
    }
    @media (max-width: 750px) {

      .description { font-size: 1.3rem; }
      .connective, .evolution-badge { font-size: 1.2rem; }

      .flex-row { flex-direction: column; }
    }
    .active .card {
      animation: fadeUpIn 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
    }
    @keyframes fadeUpIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

  // ----- Build slideshow with fully preserved HTML structure -----
  const slidesContainer = document.getElementById('slidesWrapper');
  let slideElements = [];
  let currentIndex = 0;

  function buildSlides() {
    slidesContainer.innerHTML = '';
    slidesHTML.forEach((slideData, idx) => {
      const slideDiv = document.createElement('div');
      slideDiv.className = 'slide';
      if (idx === 0) slideDiv.classList.add('active');
      // insert raw HTML (preserves all tags, image-slots, placeholders)
      slideDiv.innerHTML = slideData.html;
      slidesContainer.appendChild(slideDiv);
      slideElements.push(slideDiv);
    });
  }

  function updateProgressAndCounter() {
    const percent = ((currentIndex + 1) / slideElements.length) * 100;
    const progressBar = document.getElementById('progressBar');
    if (progressBar) progressBar.style.width = `${percent}%`;
    const counter = document.getElementById('slideCounter');
    if (counter) counter.innerText = `${currentIndex + 1} / ${slideElements.length}`;
  }

  function showSlide(index) {
    if (index < 0) index = 0;
    if (index >= slideElements.length) index = slideElements.length - 1;
    if (index === currentIndex) return;
    slideElements[currentIndex].classList.remove('active');
    currentIndex = index;
    slideElements[currentIndex].classList.add('active');
    updateProgressAndCounter();
  }

  function nextSlide() { showSlide(currentIndex + 1); }
  function prevSlide() { showSlide(currentIndex - 1); }

  // keyboard and touch support
  function handleKeydown(e) {
    if (e.key === 'ArrowRight') { e.preventDefault(); nextSlide(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
    else if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); nextSlide(); }
  }

  let touchStartX = 0;
  function onTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
  function onTouchEnd(e) {
    const endX = e.changedTouches[0].screenX;
    const diff = touchStartX - endX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) nextSlide();
      else prevSlide();
    }
  }

  function init() {
    buildSlides();
    updateProgressAndCounter();
    document.getElementById('nextBtn').addEventListener('click', nextSlide);
    document.getElementById('prevBtn').addEventListener('click', prevSlide);
    window.addEventListener('keydown', handleKeydown);
    const container = document.querySelector('.slideshow-container');
    container.addEventListener('touchstart', onTouchStart, { passive: false });
    container.addEventListener('touchend', onTouchEnd);
  }

  init();

  // HELPER NOTE: To add images, simply select any .image-slot element and replace innerHTML with <img src="your-image.jpg" alt="...">.
