<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Personal Operating Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --void: #04060d;
  --deep: #080e1c;
  --panel: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text: #dce8ff;
  --dim: #5a7090;
  --gold: #e8c97a;
  --cyan: #4df5d6;
  --red: #ff5e6c;
  --blue: #5b9eff;
  --white: #f0f6ff;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100vw; height:100vh;
  overflow:hidden;
  background:var(--void);
  color:var(--text);
  font-family:'Syne', sans-serif;
  cursor:default;
}

/* ══ AMBIENT ORBS ══ */
#orbs {
  position:fixed; inset:0; pointer-events:none; z-index:0;
  overflow:hidden;
}
.orb {
  position:absolute;
  border-radius:50%;
  filter:blur(90px);
  opacity:0.18;
  transition:opacity 1s;
}
.orb1 { width:600px;height:600px;background:#1a4fff;top:-200px;right:-100px;animation:drift1 18s ease-in-out infinite; }
.orb2 { width:400px;height:400px;background:#00d4aa;bottom:-150px;left:-80px;animation:drift2 22s ease-in-out infinite; }
.orb3 { width:300px;height:300px;background:#ff4466;top:40%;right:10%;animation:drift3 15s ease-in-out infinite; }

@keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,80px)} }
@keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(80px,-60px)} }
@keyframes drift3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,40px)} }

/* ══ DECK ══ */
#deck { position:relative; width:100vw; height:100vh; z-index:1; }

.slide {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  padding:56px 88px;
  opacity:0; pointer-events:none;
  transform:scale(0.97) translateY(20px);
  transition:opacity 0.55s cubic-bezier(.4,0,.2,1), transform 0.55s cubic-bezier(.4,0,.2,1);
  text-align:center;
}
.slide.active { opacity:1; pointer-events:all; transform:scale(1) translateY(0); }
.slide.exit    { opacity:0; transform:scale(1.02) translateY(-20px); }

/* noise overlay */
.slide::before {
  content:'';
  position:absolute; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0; opacity:0.5;
}
.slide > * { position:relative; z-index:1; }

/* ══ TYPE ══ */
.eyebrow {
  font-family:'JetBrains Mono', monospace;
  font-size:21px; font-weight:400;
  letter-spacing:5px; text-transform:uppercase;
  color:var(--cyan); margin-bottom:22px;
  opacity:0.85;
}
.eyebrow.gold { color:var(--gold); }
.eyebrow.red  { color:var(--red); }
.eyebrow.blue { color:var(--blue); }

.display {
  font-family:'Syne', sans-serif;
  font-weight:800;
  font-size:clamp(48px, 7.5vw, 80px);
  line-height:1.0;
  letter-spacing:-1px;
  margin-bottom:28px;
  color:var(--white);
}

.title {
  font-family:'Syne', sans-serif;
  font-weight:700;
  font-size:clamp(38px, 5.5vw, 60px);
  line-height:1.1;
  margin-bottom:24px;
  color:var(--white);
}

.serif-title {
  font-family:'Instrument Serif', serif;
  font-size:clamp(36px, 5vw, 58px);
  line-height:1.15;
  margin-bottom:24px;
  font-style:italic;
  color:var(--white);
}

.body {
  font-size:clamp(22px, 2.1vw, 30px);
  line-height:1.65;
  max-width:820px;
  color:#a8bfd8;
  font-weight:400;
}
.body b { color:var(--cyan); font-weight:700; }
.body em { color:var(--gold); font-style:normal; font-weight:700; }
.body s  { color:var(--red); text-decoration:none; }

.mono {
  font-family:'JetBrains Mono', monospace;
  font-size:clamp(20px, 1.7vw, 26px);
}

/* ══ RULE ══ */
.rule { width:60px; height:2px; background:var(--cyan); margin:0 auto 28px; border-radius:2px; }
.rule.gold { background:var(--gold); }
.rule.red  { background:var(--red); }
.rule.blue { background:var(--blue); }

/* ══ CARDS ══ */
.card-grid {
  display:grid;
  gap:18px;
  width:100%; max-width:940px;
  margin-top:8px;
}
.card-grid.cols2 { grid-template-columns:1fr 1fr; }
.card-grid.cols3 { grid-template-columns:repeat(3,1fr); }

.card {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:28px 24px;
  text-align:left;
}
.card h4 {
  font-size:clamp(22px, 2vw, 28px);
  font-weight:700;
  margin-bottom:10px;
  color:var(--white);
}
.card p {
  font-size:clamp(20px, 1.6vw, 23px);
  color:#7a9ab8;
  line-height:1.5;
}
.card .icon { font-size:clamp(36px,4vw,50px); margin-bottom:14px; line-height:1; }

/* ══ LIST ══ */
.vlist {
  list-style:none;
  max-width:780px; width:100%;
  text-align:left;
}
.vlist li {
  font-size:clamp(22px, 2vw, 29px);
  padding:13px 0;
  border-bottom:1px solid var(--border);
  gap:16px; align-items:flex-start;
  line-height:1.4;
  color:#b8d0e8;
}
.vlist li::before {
  content:'◈';
  color:var(--cyan);
  font-size:20px;
  flex-shrink:0;
  margin-top:3px;
}
.vlist.gold li::before { color:var(--gold); }
.vlist.red  li::before { color:var(--red); }
.vlist li span { color:var(--gold); }

/* ══ TERMINAL ══ */
.terminal {
  background:#010810;
  border:1px solid rgba(77,245,214,0.2);
  border-radius:14px;
  padding:28px 32px;
  font-family:'JetBrains Mono', monospace;
  font-size:clamp(20px, 1.7vw, 24px);
  text-align:left;
  max-width:840px; width:100%;
  line-height:1.9;
}
.terminal .prompt { color:var(--cyan); }
.terminal .cmd    { color:var(--white); }
.terminal .out    { color:var(--gold); }
.terminal .dim    { color:var(--dim); }
.terminal .ok     { color:#4df59e; }
.terminal .err    { color:var(--red); }

/* ══ VERSUS ══ */
.versus {
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:24px;
  align-items:center;
  max-width:960px; width:100%;
}
.vs-box {
  background:var(--panel);
  border-radius:16px;
  padding:32px 24px;
  text-align:center;
}
.vs-box h3 {
  font-family:'Syne', sans-serif;
  font-size:clamp(28px, 3vw, 40px);
  font-weight:800;
  margin-bottom:14px;
}
.vs-box p {
  font-size:clamp(21px, 1.8vw, 26px);
  color:#6a8aa8;
  line-height:1.5;
}
.vs-mid {
  font-family:'Syne', sans-serif;
  font-size:clamp(32px,4vw,52px);
  font-weight:800;
  color:var(--dim);
}

/* ══ STAT ROW ══ */
.stat-row {
  display:flex; gap:20px;
  max-width:900px; width:100%;
}
.stat-box {
  flex:1;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:28px 20px;
  text-align:center;
}
.stat-num {
  font-family:'Syne', sans-serif;
  font-weight:800;
  font-size:clamp(42px, 5.5vw, 60px);
  line-height:1;
  margin-bottom:10px;
}
.stat-label {
  font-size:clamp(20px, 1.6vw, 23px);
  color:var(--dim);
  line-height:1.35;
}

/* ══ ORBIT VISUAL (SVG) ══ */
.orbit-wrap { position:relative; width:260px; height:260px; margin-bottom:24px; flex-shrink:0; }

/* ══ QUOTE ══ */
.quote-wrap {
  border-left:3px solid var(--gold);
  padding:24px 32px;
  text-align:left;
  max-width:840px;
  background:rgba(232,201,122,0.05);
  border-radius:0 14px 14px 0;
}
.quote-wrap q {
  font-family:'Instrument Serif', serif;
  font-size:clamp(28px, 3vw, 42px);
  line-height:1.45;
  font-style:italic;
  color:var(--white);
  quotes:none;
  display:block;
  margin-bottom:14px;
}
.quote-wrap cite {
  font-family:'JetBrains Mono', monospace;
  font-size:21px;
  color:var(--gold);
  font-style:normal;
}

/* ══ TAG CLOUD ══ */
.tags { display:flex; flex-wrap:wrap; justify-content:center; gap:10px; max-width:860px; margin-top:8px; }
.tag {
  font-family:'JetBrains Mono', monospace;
  font-size:21px;
  padding:9px 22px;
  border-radius:100px;
  border:1px solid;
}
.tag.c { border-color:rgba(77,245,214,.35); color:var(--cyan); background:rgba(77,245,214,.07); }
.tag.g { border-color:rgba(232,201,122,.35); color:var(--gold); background:rgba(232,201,122,.07); }
.tag.r { border-color:rgba(255,94,108,.35); color:var(--red); background:rgba(255,94,108,.07); }
.tag.b { border-color:rgba(91,158,255,.35); color:var(--blue); background:rgba(91,158,255,.07); }

/* ══ LAYER STACK ══ */
.layer-stack {
  display:flex; flex-direction:column; gap:10px;
  max-width:780px; width:100%;
}
.layer {
  display:flex; align-items:center; gap:20px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px 28px;
}
.layer-num {
  font-family:'JetBrains Mono', monospace;
  font-size:22px;
  color:var(--dim);
  width:32px; flex-shrink:0;
}
.layer-name {
  font-family:'Syne', sans-serif;
  font-weight:700;
  font-size:clamp(22px, 2vw, 28px);
  color:var(--white);
  min-width:220px;
}
.layer-desc {
  font-size:clamp(20px, 1.7vw, 24px);
  color:#6a8aa8;
  text-align:left;
}
.layer.hi { border-color:rgba(77,245,214,0.3); }
.layer.hi .layer-num { color:var(--cyan); }

/* ══ ARROW TRANSITION ══ */
.big-arrow {
  display:flex; align-items:center; gap:32px;
  margin:20px 0;
}
.big-arrow .word {
  font-family:'Syne', sans-serif;
  font-weight:800;
  font-size:clamp(38px, 5.5vw, 60px);
  letter-spacing:-1px;
}
.big-arrow .arr {
  font-size:clamp(32px, 4vw, 52px);
  color:var(--cyan);
  animation:arrowPulse 2s ease-in-out infinite;
}
@keyframes arrowPulse {
  0%,100%{opacity:1;transform:translateX(0)}
  50%{opacity:0.4;transform:translateX(10px)}
}

/* ══ PLAYER CARDS ══ */
.player-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  max-width:940px; width:100%;
}
.player {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:26px 18px;
  text-align:center;
}
.player .logo {
  font-size:clamp(36px,4vw,50px);
  margin-bottom:10px;
  line-height:1;
}
.player h4 {
  font-family:'Syne', sans-serif;
  font-weight:700;
  font-size:clamp(21px,1.9vw,26px);
  color:var(--white);
  margin-bottom:8px;
}
.player p { font-size:clamp(20px,1.6vw,22px); color:var(--dim); line-height:1.4; }

/* ══ CHROME / NAV ══ */
#progress {
  position:fixed; bottom:0; left:0;
  height:2px;
  background:linear-gradient(90deg, var(--cyan), var(--blue));
  transition:width .5s ease;
  z-index:100;
  box-shadow:0 0 12px rgba(77,245,214,0.5);
}
#counter {
  position:fixed; bottom:22px; right:28px;
  font-family:'JetBrains Mono', monospace;
  font-size:21px; color:var(--dim);
  z-index:100;
}
.nav-btn {
  position:fixed; top:50%; transform:translateY(-50%);
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  color:var(--text); font-size:26px;
  width:50px; height:50px;
  border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  z-index:100;
  transition:background .2s, border-color .2s, box-shadow .2s;
}
.nav-btn:hover { background:rgba(77,245,214,0.1); border-color:var(--cyan); box-shadow:0 0 16px rgba(77,245,214,0.2); }
#prev { left:18px; }
#next { right:18px; }

#dots {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  display:flex; gap:6px; z-index:100;
}
.dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--dim); cursor:pointer;
  transition:background .3s, width .3s;
}
.dot.on { background:var(--cyan); width:20px; border-radius:3px; box-shadow:0 0 8px rgba(77,245,214,0.6); }

/* ══ SCAN LINES ══ */
body::after {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:50;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 3px);
}
</style>
</head>

// ── RENDER ──────────────────────────────────────────────
const deck    = document.getElementById('deck');
const bar     = document.getElementById('progress');
const counter = document.getElementById('counter');
const dotsEl  = document.getElementById('dots');
let cur = 0, busy = false;

slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  div.innerHTML = s.html;
  deck.appendChild(div);

  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' on' : '');
  dot.onclick = () => goTo(i);
  dotsEl.appendChild(dot);
});

const allSlides = deck.querySelectorAll('.slide');
const allDots   = dotsEl.querySelectorAll('.dot');

function ui() {
  counter.textContent = `${cur + 1} / ${slides.length}`;
  bar.style.width = ((cur + 1) / slides.length * 100) + '%';
  allDots.forEach((d, i) => d.classList.toggle('on', i === cur));
}

function goTo(n) {
  if (busy || n === cur) return;
  busy = true;
  const prev = cur; cur = n;
  allSlides[prev].classList.add('exit');
  allSlides[prev].classList.remove('active');
  setTimeout(() => {
    allSlides[prev].classList.remove('exit');
    allSlides[cur].classList.add('active');
    ui();
    setTimeout(() => { busy = false; }, 600);
  }, 280);
}

const next = () => goTo((cur + 1) % slides.length);
const prev = () => goTo((cur - 1 + slides.length) % slides.length);

document.getElementById('next').onclick = next;
document.getElementById('prev').onclick = prev;
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') next();
  if (e.key === 'ArrowLeft') prev();
});
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (dx < -50) next(); if (dx > 50) prev();
});

ui();
</script>
