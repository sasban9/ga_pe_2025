<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASBAN 2025</title>
    <style>
        *{margin: 0;padding: 0;box-sizing: border-box;}
        body{display: flex;flex-direction: column;justify-content: space-between;align-items: center;height:100vh}
        main{display: flex;flex-direction: row;height: 50vh;align-items: end;justify-content: center;padding-bottom: 100px;background: lightcyan;}
        div{height: 45vh;min-width: 200px;margin: 0.5rem;box-shadow: 0 0 10px #000;transform: rotate(-2deg);}
        /* div:nth-of-type(4n+2),div:nth-of-type(4n+3){margin-top: 2rem;} */
        div:nth-of-type(2n){margin-top: 2rem;}
        h1,h2{font-size: 3rem;font-family: fantasy;}
        img{display: inline-block;}
        div:hover{transform: rotate(3deg);transition: all 6s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
    </style>
</head>
<body>
    <h2>I am a foodie!</h2>
    <main>
        <div style="background: url('sas6.png')50% 50%; background-size: cover;"></div>
    <div style="background: url('sas7.png')50% 50%; background-size: cover;"></div>

    <div style="background: url('sas9.png')50% 50%; background-size: cover;"></div>

</html>
