<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee → Algorithm Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --accent1: #00ffc2;
    --accent2: #ff4d6d;
    --accent3: #ffd60a;
    --accent4: #7b8cde;
    --text: #e8eaf6;
    --dim: #8899aa;
    --card: rgba(255,255,255,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* ── SLIDE CONTAINER ── */
  #deck {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 80px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease, transform 0.6s ease;
    transform: translateY(30px);
    text-align: center;
  }

  .slide.active {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }

  .slide.exit {
    opacity: 0;
    transform: translateY(-30px);
  }

  /* ── GRID BACKGROUND ── */
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,194,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,194,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .slide > * { position: relative; z-index: 1; }

  /* ── TYPOGRAPHY ── */
  .label {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    color: var(--accent1);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0.85;
  }

  .huge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 8vw, 90px);
    line-height: 1;
    letter-spacing: 2px;
    margin-bottom: 24px;
  }

  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px, 6vw, 72px);
    line-height: 1.1;
    margin-bottom: 24px;
    letter-spacing: 1px;
  }

  .body {
    font-size: clamp(22px, 2.2vw, 34px);
    line-height: 1.6;
    max-width: 820px;
    color: #c8d8e8;
    font-weight: 300;
  }

  .body strong {
    color: var(--accent1);
    font-weight: 500;
  }

  .body em {
    color: var(--accent3);
    font-style: normal;
    font-weight: 500;
  }

  .mono {
    font-family: 'Space Mono', monospace;
    font-size: clamp(21px, 1.8vw, 28px);
  }

  /* ── ACCENT COLORS ── */
  .c1 { color: var(--accent1); }
  .c2 { color: var(--accent2); }
  .c3 { color: var(--accent3); }
  .c4 { color: var(--accent4); }

  /* ── DIVIDER ── */
  .rule {
    width: 80px;
    height: 3px;
    background: var(--accent1);
    margin: 0 auto 32px;
    border-radius: 2px;
  }

  .rule.red { background: var(--accent2); }
  .rule.yellow { background: var(--accent3); }
  .rule.blue { background: var(--accent4); }

  /* ── STAT GRID ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    width: 100%;
    max-width: 900px;
    margin-top: 16px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid rgba(0,255,194,0.15);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 5vw, 58px);
    color: var(--accent1);
    line-height: 1;
    margin-bottom: 8px;
  }

  .stat-desc {
    font-size: clamp(20px, 1.6vw, 24px);
    color: var(--dim);
  }

  /* ── LIST ── */
  .list {
    list-style: none;
    text-align: left;
    max-width: 760px;
    width: 100%;
  }

  .list li {
    font-size: clamp(22px, 2vw, 30px);
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: flex-start;
    gap: 16px;
    line-height: 1.4;
    color: #c8d8e8;
  }

  .list li::before {
    content: '▹';
    color: var(--accent1);
    font-size: 22px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .list li span { color: var(--accent3); }

  /* ── TWO-COL ── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    max-width: 960px;
    width: 100%;
    text-align: left;
  }

  .col-box {
    background: var(--card);
    border-radius: 14px;
    padding: 32px 28px;
  }

  .col-box h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 3vw, 44px);
    margin-bottom: 18px;
    letter-spacing: 1px;
  }

  .col-box p {
    font-size: clamp(21px, 1.7vw, 26px);
    line-height: 1.55;
    color: #b0c4d4;
  }

  /* ── QUOTE ── */
  .quote-block {
    border-left: 4px solid var(--accent3);
    padding: 28px 36px;
    text-align: left;
    max-width: 820px;
    background: rgba(255,214,10,0.05);
    border-radius: 0 12px 12px 0;
  }

  .quote-block p {
    font-size: clamp(26px, 2.6vw, 38px);
    line-height: 1.5;
    font-style: italic;
    color: var(--text);
    margin-bottom: 16px;
  }

  .quote-block cite {
    font-size: 22px;
    color: var(--accent3);
    font-style: normal;
    font-family: 'Space Mono', monospace;
  }

  /* ── CODE BLOCK ── */
  .code-box {
    background: #0d1117;
    border: 1px solid rgba(0,255,194,0.2);
    border-radius: 12px;
    padding: 28px 36px;
    font-family: 'Space Mono', monospace;
    font-size: clamp(21px, 1.7vw, 26px);
    text-align: left;
    max-width: 820px;
    width: 100%;
    line-height: 1.8;
    color: #cdd6f4;
  }

  .code-box .kw { color: var(--accent2); }
  .code-box .fn { color: var(--accent1); }
  .code-box .st { color: var(--accent3); }
  .code-box .cm { color: var(--dim); }

  /* ── BIG ARROW ── */
  .arrow-display {
    display: flex;
    align-items: center;
    gap: 36px;
    margin: 28px 0;
  }

  .arrow-display .word {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(44px, 6vw, 70px);
    letter-spacing: 2px;
  }

  .arrow-display .arr {
    font-size: clamp(36px, 4vw, 52px);
    color: var(--accent1);
    animation: pulse 1.8s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: translateX(0); }
    50% { opacity: 0.5; transform: translateX(8px); }
  }

  /* ── PROGRESS ── */
  #progress-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent1), var(--accent4));
    transition: width 0.5s ease;
    z-index: 100;
  }

  /* ── SLIDE COUNTER ── */
  #counter {
    position: fixed;
    bottom: 20px;
    right: 28px;
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    color: var(--dim);
    z-index: 100;
  }

  /* ── NAV ARROWS ── */
  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    font-size: 28px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: background 0.2s, border-color 0.2s;
  }

  .nav-btn:hover { background: rgba(0,255,194,0.1); border-color: var(--accent1); }
  #prev { left: 20px; }
  #next { right: 20px; }

  /* ── SLIDE NUMBER DOTS ── */
  #dots {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 100;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s, width 0.3s;
    cursor: pointer;
  }

  .dot.on { background: var(--accent1); width: 18px; border-radius: 3px; }

  /* ── SCAN LINE ── */
  .slide::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.08) 3px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* ── PILL TAG ── */
  .pill {
    display: inline-block;
    background: rgba(0,255,194,0.12);
    border: 1px solid rgba(0,255,194,0.3);
    color: var(--accent1);
    font-family: 'Space Mono', monospace;
    font-size: 21px;
    padding: 8px 20px;
    border-radius: 100px;
    margin: 6px 4px;
  }

  .pill.red { background: rgba(255,77,109,0.12); border-color: rgba(255,77,109,0.3); color: var(--accent2); }
  .pill.yellow { background: rgba(255,214,10,0.12); border-color: rgba(255,214,10,0.3); color: var(--accent3); }

  /* ── GLOW ── */
  .glow { text-shadow: 0 0 30px rgba(0,255,194,0.5); }
  .glow2 { text-shadow: 0 0 30px rgba(255,77,109,0.5); }
  .glow3 { text-shadow: 0 0 30px rgba(255,214,10,0.5); }

  /* ── SPECIFIC SLIDE BG TINTS ── */
  .tint-red::before { background-image: linear-gradient(rgba(255,77,109,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,77,109,0.05) 1px, transparent 1px); background-size: 60px 60px; }
  .tint-yellow::before { background-image: linear-gradient(rgba(255,214,10,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,214,10,0.04) 1px, transparent 1px); background-size: 60px 60px; }
  .tint-blue::before { background-image: linear-gradient(rgba(123,140,222,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(123,140,222,0.06) 1px, transparent 1px); background-size: 60px 60px; }

  /* ── BIG ICON ── */
  .icon-big { font-size: clamp(60px, 8vw, 90px); margin-bottom: 16px; line-height: 1; }

  /* ── TIMELINE ── */
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    max-width: 760px;
    width: 100%;
    text-align: left;
  }

  .tl-item {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    padding: 16px 0;
    border-left: 2px solid rgba(0,255,194,0.25);
    padding-left: 28px;
    position: relative;
  }

  .tl-item::before {
    content: '';
    position: absolute;
    left: -7px;
    top: 24px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent1);
  }

  .tl-year {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    color: var(--accent1);
    min-width: 90px;
    flex-shrink: 0;
  }

  .tl-text {
    font-size: clamp(21px, 1.8vw, 26px);
    color: #b8ccd8;
    line-height: 1.4;
  }

</style>
</head>
<body>

<div id="progress-bar"></div>
<div id="counter"></div>
<div id="dots"></div>
<button class="nav-btn" id="prev">&#8592;</button>

// ── RENDER ──────────────────────────────────────────
const deck = document.getElementById('deck');
const bar = document.getElementById('progress-bar');
const counter = document.getElementById('counter');
const dotsEl = document.getElementById('dots');
let current = 0;
let transitioning = false;

slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (s.bg ? ' ' + s.bg : '');
  div.innerHTML = s.html;
  if (i === 0) div.classList.add('active');
  deck.appendChild(div);

  const dot = document.createElement('div');
  dot.className = 'dot' + (i === 0 ? ' on' : '');
  dot.onclick = () => goTo(i);
  dotsEl.appendChild(dot);
});

const allSlides = deck.querySelectorAll('.slide');
const allDots = dotsEl.querySelectorAll('.dot');

function updateUI() {
  counter.textContent = `${current + 1} / ${slides.length}`;
  bar.style.width = ((current + 1) / slides.length * 100) + '%';
  allDots.forEach((d, i) => d.classList.toggle('on', i === current));
}

function goTo(n) {
  if (transitioning || n === current) return;
  transitioning = true;
  const prev = current;
  current = n;

  allSlides[prev].classList.add('exit');
  allSlides[prev].classList.remove('active');

  setTimeout(() => {
    allSlides[prev].classList.remove('exit');
    allSlides[current].classList.add('active');
    updateUI();
    setTimeout(() => { transitioning = false; }, 650);
  }, 300);
}

function next() { goTo((current + 1) % slides.length); }
function prev() { goTo((current - 1 + slides.length) % slides.length); }

document.getElementById('next').onclick = next;
document.getElementById('prev').onclick = prev;

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') next();
  if (e.key === 'ArrowLeft') prev();
});

// Touch/swipe
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (dx < -50) next();
  if (dx > 50) prev();
});

updateUI();
</script>
