<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../06.prompt-hacking/styles.css">
    <style>
        .slide{padding-right: 300px;}
        blockquote{color: #fff;}
        th,td{font-size: 1.2rem;}
        ul{display: flex;font-size: 1.7rem;gap:(6rem,3rem);width: 100%;flex-wrap: wrap;}
        li{width: 50%;}
    </style>
</head>
<body>
    <div style="position: fixed;font-size: 18rem;z-index:999999;opacity: 0.05;color:#fff;transform: rotate(-5deg) scale(1);left: 0;top:0;margin: 0;border: solid 12px #000;display:flex;justify-content: end;height:100vh;align-items:center;width:100vw;line-height: 1;font-weight: 300;color:#000;text-shadow: 0 0 20px #fff3;">sasban9</div>
    <img class="bounce"
        style="position: absolute;bottom: 1rem;left: 1rem;z-index: 999;height: 90px;border-radius: 100%;transform: rotate(-6deg);"
        src="https://sasban9.github.io/www/sasban.jpg" alt="">
    <a class="linktree" href="http://linktr.ee/sasban9">linktr.ee/sasban9</a>
    <div class="progress-bar" id="progressBar"></div>
    <div class="slide-container">
        <div class="slide active">
            
        </div>
    </div>

    <script>
        const slides = document.querySelectorAll('.slide');
        const progressBar = document.getElementById('progressBar');
        let currentSlide = 0;

        function showSlide(index) {
            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
            });
            const progress = ((index + 1) / slides.length) * 100;
            progressBar.style.width = progress + '%';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                if (currentSlide < slides.length - 1) {
                    currentSlide++;
                    showSlide(currentSlide);
                }
            }
            if (e.key === 'ArrowLeft') {
                if (currentSlide > 0) {
                    currentSlide--;
                    showSlide(currentSlide);
                }
            }
        });

        showSlide(currentSlide);
    </script>
</body>
</html>
